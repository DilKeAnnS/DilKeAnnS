        function renderCategories() {
            const container = document.getElementById('categoryDoors');
            container.innerHTML = categoryList.map(cat => `
                <button class="category-door ${currentCategory === cat.id ? 'active' : ''}" onclick="switchCategory('${cat.id}')">
                    ${cat.icon} ${currentLang === 'hindi' ? cat.name_hindi : cat.name_english}
                </button>
            `).join('');
        }

        function switchCategory(categoryId) {
            currentCategory = categoryId;
            renderCategories();
            renderDoors();
        }

        function filterItems(items) {
            if (!searchTerm) return items;
            const term = searchTerm.toLowerCase();
            return items.filter(item => 
                (item.title_hindi?.toLowerCase().includes(term) ||
                 item.title_english?.toLowerCase().includes(term) ||
                 item.description_hindi?.toLowerCase().includes(term) ||
                 item.description_english?.toLowerCase().includes(term))
            );
        }

        function renderDoors() {
            const data = AFTER_10TH_DATA[currentCategory];
            if (!data) return;
            
            const searchInput = document.getElementById('searchBox');
            searchTerm = searchInput ? searchInput.value : '';
            
            let filteredItems = filterItems(data.items);
            document.getElementById('testCount').innerHTML = `📋 ${filteredItems.length} ऑप्शन उपलब्ध`;
            
            const container = document.getElementById('doorsContainer');
            let html = `
                <div class="door-card">
                    <div class="door-header ${currentCategory}">
                        <span class="door-icon">${data.icon}</span>
                        <div class="door-title">${currentLang === 'hindi' ? data.name_hindi : data.name_english}</div>
                    </div>
                    <div class="door-content">
                        ${filteredItems.map(item => `
                            <div class="item-card">
                                <div class="item-title">${currentLang === 'hindi' ? item.title_hindi : item.title_english}</div>
                                <div class="item-description">${currentLang === 'hindi' ? item.description_hindi : item.description_english}</div>
                                <div class="item-detail">
                                    ${item.duration ? `<span class="badge badge-duration">⏱️ ${item.duration}</span>` : ''}
                                    ${item.career ? `<span class="badge badge-salary">💼 ${item.career}</span>` : ''}
                                    ${item.salary ? `<span class="badge badge-salary">💰 ${item.salary}</span>` : ''}
                                    ${item.exams ? `<span class="badge badge-exam">📝 ${item.exams}</span>` : ''}
                                    ${item.eligibility ? `<span class="badge badge-exam">✅ ${item.eligibility}</span>` : ''}
                                    ${item.amount ? `<span class="badge badge-scholarship">💰 ${item.amount}</span>` : ''}
                                    ${item.stipend ? `<span class="badge badge-salary">💰 ${item.stipend}</span>` : ''}
                                </div>
                                <a href="${item.officialLink}" target="_blank" class="official-link">🔗 आधिकारिक जानकारी →</a>
                            </div>
                        `).join('')}
                        ${filteredItems.length === 0 ? '<div class="empty-state">🔍 कोई परिणाम नहीं मिला</div>' : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function toggleLang() {
            currentLang = currentLang === 'hindi' ? 'english' : 'hindi';
            document.querySelector('.lang-toggle').innerHTML = currentLang === 'hindi' ? '🇬🇧 English' : '🇮🇳 हिंदी';
            renderCategories();
            renderDoors();
        }

        function handleSearch() { renderDoors(); }

        function init() {
            renderCategories();
            renderDoors();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
        }
        init();
    </script>
</body>
</html>
