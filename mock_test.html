        let db = null;
        function openDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open('MockTestDB_Final', 3);
                req.onupgradeneeded = (e) => { e.target.result.createObjectStore('history', { keyPath: 'id' }); };
                req.onsuccess = (e) => { db = e.target.result; resolve(); };
            });
        }
        async function saveHistory(data) {
            await openDB();
            const tx = db.transaction('history', 'readwrite');
            tx.objectStore('history').add({ ...data, id: Date.now() });
        }
        async function getHistory() {
            await openDB();
            return new Promise((resolve) => {
                const req = db.transaction('history').objectStore('history').getAll();
                req.onsuccess = () => resolve(req.result || []);
            });
        }

                { id: "stream_medical_physics", title: "Medical - Physics", q: 100, t: 90, diff: "Advanced" }
            ]},
            non_medical: { name: "🔧 Non-Medical", icon: "🔧", tests: [
                { id: "stream_nm_jee", title: "Non-Medical - JEE Pattern", q: 90, t: 180, diff: "Expert" },
                { id: "stream_nm_maths", title: "Non-Medical - Mathematics", q: 100, t: 90, diff: "Advanced" },
                { id: "stream_nm_physics", title: "Non-Medical - Physics", q: 100, t: 90, diff: "Advanced" },
                { id: "stream_nm_chemistry", title: "Non-Medical - Chemistry", q: 100, t: 90, diff: "Advanced" }
            ]},
            commerce: { name: "📊 Commerce", icon: "📊", tests: [
                { id: "stream_com_ca", title: "Commerce - CA Foundation", q: 200, t: 240, diff: "Advanced" },
                { id: "stream_com_accounts", title: "Commerce - Accountancy", q: 100, t: 90, diff: "Advanced" },
                { id: "stream_com_business", title: "Commerce - Business Studies", q: 100, t: 90, diff: "Intermediate" },
                { id: "stream_com_economics", title: "Commerce - Economics", q: 100, t: 90, diff: "Advanced" }
            ]},
            arts: { name: "🎭 Arts", icon: "🎭", tests: [
                { id: "stream_arts_history", title: "Arts - History", q: 100, t: 90, diff: "Intermediate" },
                { id: "stream_arts_polity", title: "Arts - Political Science", q: 100, t: 90, diff: "Intermediate" },
                { id: "stream_arts_geography", title: "Arts - Geography", q: 100, t: 90, diff: "Intermediate" },
                { id: "stream_arts_sociology", title: "Arts - Sociology", q: 100, t: 90, diff: "Intermediate" }
            ]},
            sports: { name: "⚽ Sports", icon: "⚽", tests: [
                { id: "stream_sports_phyedu", title: "Sports - Physical Education", q: 100, t: 90, diff: "Intermediate" },
                { id: "stream_sports_coaching", title: "Sports - Coaching Theory", q: 100, t: 90, diff: "Intermediate" }
            ]},
            agriculture: { name: "🌾 Agriculture", icon: "🌾", tests: [
                { id: "stream_agri_science", title: "Agriculture - Science", q: 100, t: 90, diff: "Advanced" },
                { id: "stream_agri_icar", title: "Agriculture - ICAR Pattern", q: 100, t: 90, diff: "Advanced" }
            ]},
            artist: { name: "🎨 Artist", icon: "🎨", tests: [
                { id: "stream_artist_finearts", title: "Artist - Fine Arts", q: 100, t: 90, diff: "Intermediate" },
                { id: "stream_artist_design", title: "Artist - Design Aptitude", q: 100, t: 90, diff: "Advanced" }
            ]},
            designing: { name: "✏️ Designing", icon: "✏️", tests: [
                { id: "stream_design_nift", title: "Designing - NIFT Pattern", q: 100, t: 120, diff: "Advanced" },
                { id: "stream_design_nid", title: "Designing - NID Pattern", q: 100, t: 120, diff: "Advanced" }
            ]},
            skilled_trade: { name: "🔨 Skilled Trade", icon: "🔨", tests: [
                { id: "stream_skill_iti", title: "Skilled Trade - ITI Theory", q: 100, t: 90, diff: "Medium" },
                { id: "stream_skill_diploma", title: "Skilled Trade - Diploma", q: 100, t: 90, diff: "Intermediate" }
            ]},
            abroad: { name: "🌍 Abroad Studies", icon: "🌍", tests: [
                { id: "stream_abroad_ielts", title: "Abroad - IELTS Prep", q: 100, t: 180, diff: "Intermediate" },
                { id: "stream_abroad_gre", title: "Abroad - GRE Prep", q: 100, t: 180, diff: "Advanced" },
                { id: "stream_abroad_gmat", title: "Abroad - GMAT Prep", q: 100, t: 180, diff: "Advanced" }
            ]}
        };

        // MAIN CATEGORY 4: TOPIC WISE
        const TOPIC_TESTS = {
            gk: { name: "📖 सामान्य ज्ञान", icon: "📖", tests: [
                { id: "topic_gk_history", title: "Indian History", q: 50, t: 45, diff: "Medium" },
                { id: "topic_gk_polity", title: "Indian Polity", q: 50, t: 45, diff: "Medium" },
                { id: "topic_gk_geography", title: "Geography", q: 50, t: 45, diff: "Medium" },
                { id: "topic_gk_economy", title: "Economy", q: 50, t: 45, diff: "Advanced" },
                { id: "topic_gk_science", title: "Science & Tech", q: 50, t: 45, diff: "Advanced" }
            ]},
            maths: { name: "🧮 गणित", icon: "🧮", tests: [
                { id: "topic_maths_arithmetic", title: "Arithmetic", q: 50, t: 60, diff: "Medium" },
                { id: "topic_maths_algebra", title: "Algebra", q: 40, t: 50, diff: "Advanced" },
                { id: "topic_maths_geometry", title: "Geometry", q: 40, t: 50, diff: "Advanced" },
                { id: "topic_maths_trig", title: "Trigonometry", q: 30, t: 40, diff: "Advanced" }
            ]},
            reasoning: { name: "💡 रीजनिंग", icon: "💡", tests: [
                { id: "topic_reasoning_verbal", title: "Verbal Reasoning", q: 50, t: 45, diff: "Medium" },
                { id: "topic_reasoning_nonverbal", title: "Non-Verbal", q: 50, t: 45, diff: "Advanced" },
                { id: "topic_reasoning_analytical", title: "Analytical", q: 40, t: 40, diff: "Advanced" }
            ]},
            english: { name: "📝 English", icon: "📝", tests: [
                { id: "topic_english_grammar", title: "Grammar", q: 50, t: 45, diff: "Medium" },
                { id: "topic_english_vocab", title: "Vocabulary", q: 50, t: 45, diff: "Medium" },
                { id: "topic_english_comprehension", title: "Comprehension", q: 30, t: 40, diff: "Medium" }
            ]}
        };

        // MAIN CATEGORY 5: TEST MODES
        const MODE_TESTS = {
            practice: { name: "🎯 प्रैक्टिस मोड", icon: "🎯", tests: [
                { id: "mode_practice_gk", title: "Practice - GK", q: 25, t: 0, diff: "All" },
                { id: "mode_practice_maths", title: "Practice - Maths", q: 25, t: 0, diff: "All" },
                { id: "mode_practice_reasoning", title: "Practice - Reasoning", q: 25, t: 0, diff: "All" }
            ]},
            daily: { name: "📅 दैनिक क्विज", icon: "📅", tests: [
                { id: "daily_quiz_today", title: "Today's Quiz", q: 10, t: 10, diff: "Medium" },
                { id: "daily_quiz_week1", title: "Week 1 Quiz", q: 10, t: 10, diff: "Medium" }
            ]},
            full_length: { name: "📋 फुल लेंथ", icon: "📋", tests: [
                { id: "full_upsc", title: "Full Length - UPSC", q: 100, t: 120, diff: "Expert" },
                { id: "full_ssc", title: "Full Length - SSC", q: 100, t: 60, diff: "Advanced" },
                { id: "full_banking", title: "Full Length - Banking", q: 100, t: 60, diff: "Advanced" }
            ]}
        };

        // Combine all test categories
        const ALL_TEST_CATEGORIES = {
            exam_type: { name: "📚 परीक्षा प्रकार", data: EXAM_TESTS },
            pyq: { name: "📜 पिछले वर्ष (2022-26)", data: PYQ_TESTS },
            streams: { name: "🎯 10 स्ट्रीम", data: STREAM_TESTS },
            topic: { name: "📖 विषय अनुसार", data: TOPIC_TESTS },
            mode: { name: "🎮 टेस्ट मोड", data: MODE_TESTS }
        };

        // State
        let currentLang = 'hindi';
        let currentMainCat = 'exam_type';
        let currentSubCat = null;
        let searchTerm = '';
        let activeTest = null;
        let currentQuestions = [];
        let userAnswers = [];
        let timerInterval = null;
        let timeRemaining = 0;
        let currentQIndex = 0;

        function renderMainTabs() {
            const container = document.getElementById('mainTabs');
            container.innerHTML = Object.keys(ALL_TEST_CATEGORIES).map(key => `
                <button class="main-tab ${currentMainCat === key ? 'active' : ''}" onclick="switchMainCat('${key}')">
                    ${ALL_TEST_CATEGORIES[key].name}
                </button>
            `).join('');
        }

        function switchMainCat(catId) {
            currentMainCat = catId;
            currentSubCat = Object.keys(ALL_TEST_CATEGORIES[catId].data)[0];
            renderMainTabs();
            renderSubTabs();
            renderTests();
        }

        function renderSubTabs() {
            const data = ALL_TEST_CATEGORIES[currentMainCat].data;
            const container = document.getElementById('subTabs');
            container.innerHTML = Object.keys(data).map(key => `
                <button class="sub-tab ${currentSubCat === key ? 'active' : ''}" onclick="switchSubCat('${key}')">
                    ${data[key].icon || '📋'} ${data[key].name}
                </button>
            `).join('');
        }

        function switchSubCat(catId) {
            currentSubCat = catId;
            renderSubTabs();
            renderTests();
        }

        function renderTests() {
            const data = ALL_TEST_CATEGORIES[currentMainCat].data[currentSubCat];
            if (!data) return;
            
            let tests = data.tests;
            if (searchTerm) {
                tests = tests.filter(t => t.title.toLowerCase().includes(searchTerm.toLowerCase()));
            }
            
            document.getElementById('testCount').innerHTML = `📋 ${tests.length} टेस्ट उपलब्ध`;
            
            const grid = document.getElementById('testsGrid');
            grid.innerHTML = tests.map(test => `
                <div class="test-card">
                    <div class="test-header-card">
                        <div class="test-title">${test.title}</div>
                        <div class="test-desc">${test.year ? `Year: ${test.year} | ` : ''}${test.q} Questions | ${test.t} minutes</div>
                    </div>
                    <div class="test-body">
                        <div class="test-stats">
                            <span class="badge badge-questions">📝 ${test.q} प्रश्न</span>
                            <span class="badge badge-time">⏱️ ${test.t} मिनट</span>
                            <span class="badge badge-diff">⭐ ${test.diff}</span>
                            ${test.year ? `<span class="badge badge-year">📅 ${test.year}</span>` : ''}
                            <span class="badge badge-free">🎓 निःशुल्क</span>
                        </div>
                        <button class="start-btn" onclick='startTest(${JSON.stringify(test)})'>▶ टेस्ट शुरू करें</button>
                    </div>
                </div>
            `).join('');
        }

        function startTest(test) {
            activeTest = test;
            currentQuestions = generateQuestions(test.q, 'mixed');
            userAnswers = new Array(currentQuestions.length).fill(null);
            timeRemaining = test.t * 60;
            currentQIndex = 0;
            renderTestInterface();
            document.getElementById('testModal').style.display = 'block';
            if (test.t > 0) startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitTest();
                } else {
                    timeRemaining--;
                    const timerElem = document.getElementById('testTimer');
                    if (timerElem) {
                        let mins = Math.floor(timeRemaining / 60);
                        let secs = timeRemaining % 60;
                        timerElem.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                    }
                }
            }, 1000);
        }

        function renderTestInterface() {
            const q = currentQuestions[currentQIndex];
            const container = document.getElementById('testContainer');
            container.innerHTML = `
                <div class="test-header-modal">
                    <div><strong>${activeTest.title}</strong><br><small>प्रश्न ${currentQIndex+1}/${currentQuestions.length}</small></div>
                    ${activeTest.t > 0 ? `<div class="timer" id="testTimer">${Math.floor(timeRemaining/60)}:${(timeRemaining%60).toString().padStart(2,'0')}</div>` : '<div class="timer">प्रैक्टिस</div>'}
                </div>
                <div class="question-text">${currentLang === 'hindi' ? q.text_hindi : q.text_english}</div>
                <div class="options">
                    ${q.options.map((opt, idx) => `
                        <div class="option ${userAnswers[currentQIndex] === idx ? 'selected' : ''}" onclick="selectOption(${idx})">
                            ${String.fromCharCode(65+idx)}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <button class="show-solution" onclick="toggleSolution()">🔍 समाधान देखें</button>
                <div id="solutionBox" class="solution-area">
                    <strong>📖 समाधान:</strong><br>${currentLang === 'hindi' ? q.solution_hindi : q.solution_english}
                </div>
                <div class="nav-buttons-test">
                    <button class="submit-btn" onclick="prevQuestion()" ${currentQIndex === 0 ? 'disabled' : ''}>◀ पिछला</button>
                    <button class="submit-btn" onclick="nextQuestion()">अगला ▶</button>
                    <button class="submit-btn" onclick="submitTest()">✅ सबमिट</button>
                </div>
            `;
            document.getElementById('solutionBox').style.display = 'none';
        }

        function selectOption(idx) {
            userAnswers[currentQIndex] = idx;
            renderTestInterface();
        }

        function toggleSolution() {
            const sol = document.getElementById('solutionBox');
            if (sol) sol.style.display = sol.style.display === 'none' ? 'block' : 'none';
        }

        function prevQuestion() {
            if (currentQIndex > 0) { currentQIndex--; renderTestInterface(); }
        }

        function nextQuestion() {
            if (currentQIndex < currentQuestions.length - 1) { currentQIndex++; renderTestInterface(); }
        }

        async function submitTest() {
            if (timerInterval) clearInterval(timerInterval);
            let correct = 0;
            for (let i = 0; i < currentQuestions.length; i++) {
                if (userAnswers[i] === currentQuestions[i].correct) correct++;
            }
            const percentage = (correct / currentQuestions.length * 100).toFixed(2);
            const result = {
                testName: activeTest.title,
                total: currentQuestions.length,
                correct: correct,
                wrong: currentQuestions.length - correct,
                percentage: percentage,
                date: new Date().toLocaleString()
            };
            await saveHistory(result);
            const container = document.getElementById('testContainer');
            container.innerHTML = `
                <div class="test-header-modal"><strong>📊 परिणाम / Result</strong></div>
                <div class="result-area">
                    <h3>${currentLang === 'hindi' ? 'आपका स्कोर' : 'Your Score'}</h3>
                    <p><strong>${result.testName}</strong></p>
                    <p>✅ सही / Correct: ${result.correct}</p>
                    <p>❌ गलत / Wrong: ${result.wrong}</p>
                    <p>📊 प्रतिशत / Percentage: ${result.percentage}%</p>
                    <p>📅 तिथि / Date: ${result.date}</p>
                    <button class="submit-btn" onclick="closeModal()">✕ बंद करें</button>
                    <button class="submit-btn" onclick="location.reload()">🏠 होम</button>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('testModal').style.display = 'none';
        }

        async function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            const overlay = document.getElementById('overlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('active');
            if (panel.classList.contains('open')) {
                const history = await getHistory();
                const list = document.getElementById('historyList');
                if (history.length === 0) list.innerHTML = '<div style="padding:20px;text-align:center;">कोई इतिहास नहीं</div>';
                else list.innerHTML = history.map(h => `
                    <div class="history-item">
                        <strong>${h.testName}</strong><br>
                        ✅ ${h.correct}/${h.total} (${h.percentage}%)<br>
                        <small>📅 ${h.date}</small>
                    </div>
                `).join('');
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'hindi' ? 'english' : 'hindi';
            document.querySelector('.lang-toggle').innerHTML = currentLang === 'hindi' ? '🇬🇧 English' : '🇮🇳 हिंदी';
        }

        function handleSearch() {
            searchTerm = document.getElementById('searchBox').value;
            renderTests();
        }

        function init() {
            renderMainTabs();
            renderSubTabs();
            renderTests();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
            openDB();
        }
        init();
    </script>
</body>
</html>
