        }

        }

        .lang-filters {

            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;

        .lang-filter {

        }

            gap: 12px;

        }

            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;

            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s;
            animation: fadeInUp 0.5s ease;

        // INDEXEDDB FOR FAVORITES
        // ============================================
        
        const DB_NAME = 'EpaperFavoritesDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'favorites';
        let db = null;
        
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('date', 'date');
                        store.createIndex('category', 'category');
                        store.createIndex('language', 'language');
                    }
                };
            });
        }
        
        async function addToFavorites(item) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const savedItem = { 
                id: `${item.category}_${item.name_english.replace(/\s/g, '_')}_${item.language}`, 
                ...item, 
                date: new Date().toISOString() 
            };
            return new Promise((resolve) => {
                const request = store.add(savedItem);
                request.onsuccess = () => resolve(true);
                request.onerror = () => resolve(false);
            });
        }
        
        async function removeFromFavorites(id) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.delete(id);
                request.onsuccess = () => resolve(true);
            });
        }
        
        async function getAllFavorites() {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
            });
        }
        
        async function isItemFavorite(id) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.get(id);
                request.onsuccess = () => resolve(!!request.result);
            });
        }

                    { name_hindi: "पंजाब केसरी (पंजाबी)", name_english: "Punjab Kesari (Punjabi)", description_hindi: "पंजाब और हरियाणा का प्रमुख पंजाबी समाचार पत्र", description_english: "Leading Punjabi newspaper from Punjab and Haryana", link: "https://epaper.punjabkesari.com/", language: "punjabi", category: "regional", region: "punjab", exam_relevance: "PPSC, HPSC" },
                    { name_hindi: "ईनाडु (तेलुगू)", name_english: "Eenadu (Telugu)", description_hindi: "तेलंगाना और आंध्र प्रदेश का सबसे बड़ा तेलुगू समाचार पत्र", description_english: "Largest Telugu newspaper from Telangana and Andhra", link: "https://epaper.eenadu.net/", language: "telugu", category: "regional", region: "andhra", exam_relevance: "APPSC, TSPSC" }
                ]
            },
            business: {
                name_hindi: "💼 व्यापार एवं वित्त",
                name_english: "💼 Business & Finance",
                icon: "📊",
                items: [
                    { name_hindi: "मिंट", name_english: "Mint", description_hindi: "व्यवसाय, वित्त और अर्थव्यवस्था पर विश्लेषण, RBI/SEBI के लिए", description_english: "Business, finance and economy analysis, for RBI/SEBI", link: "https://www.livemint.com/epaper", language: "english", category: "business", region: "all_india", exam_relevance: "RBI Grade B, SEBI, NABARD, IFSCA" },
                    { name_hindi: "बिजनेस स्टैंडर्ड", name_english: "Business Standard", description_hindi: "व्यापार समाचार और विश्लेषण", description_english: "Business news and analysis", link: "https://epaper.business-standard.com/", language: "english", category: "business", region: "all_india", exam_relevance: "RBI, SEBI, Banking" },
                    { name_hindi: "वित्तीय क्रॉनिकल", name_english: "Financial Chronicle", description_hindi: "वित्तीय समाचार और बाजार विश्लेषण", description_english: "Financial news and market analysis", link: "https://epaper.mydigitalfc.com/", language: "english", category: "business", region: "all_india", exam_relevance: "RBI, SEBI, NISM" }
                ]
            },
            sports: {
                name_hindi: "🏏 खेल समाचार पत्र",
                name_english: "🏏 Sports Newspapers",
                icon: "⚽",
                items: [
                    { name_hindi: "स्पोर्टस्टार", name_english: "Sportstar", description_hindi: "खेल समाचार और विश्लेषण की साप्ताहिक पत्रिका", description_english: "Weekly sports news and analysis magazine", link: "https://sportstar.thehindu.com/epaper/", language: "english", category: "sports", region: "all_india", exam_relevance: "Sports GK for exams" }
                ]
            },
            education: {
                name_hindi: "📚 शैक्षिक समाचार पत्र",
                name_english: "📚 Educational Newspapers",
                icon: "🎓",
                items: [
                    { name_hindi: "रोजगार समाचार", name_english: "Employment News", description_hindi: "सरकारी नौकरी के अवसर और शैक्षिक समाचार, साप्ताहिक", description_english: "Government job opportunities and educational news, weekly", link: "https://employmentnews.gov.in/", language: "both", category: "education", region: "all_india", exam_relevance: "All Government Exams" },
                    { name_hindi: "यूनिवर्सिटी न्यूज़", name_english: "University News", description_hindi: "उच्च शिक्षा और विश्वविद्यालय समाचार", description_english: "Higher education and university news", link: "https://www.universitynewsindia.com/", language: "english", category: "education", region: "all_india", exam_relevance: "NET, SET, Teaching Exams" }
                ]
            }
        };

        // Language filter options
        const languageFilters = [
            { id: 'all', name_hindi: 'सभी भाषाएँ', name_english: 'All Languages', icon: '🌐' },
            { id: 'hindi', name_hindi: 'हिंदी', name_english: 'Hindi', icon: '🇮🇳' },
            { id: 'english', name_hindi: 'अंग्रेजी', name_english: 'English', icon: '🇬🇧' },
            { id: 'regional', name_hindi: 'क्षेत्रीय', name_english: 'Regional', icon: '🗺️' }
        ];

        // Category list
        const categoryList = [
            { id: 'national', icon: '🇮🇳', name_hindi: 'राष्ट्रीय', name_english: 'National' },
            { id: 'hindi', icon: '📰', name_hindi: 'हिंदी', name_english: 'Hindi' },
            { id: 'regional', icon: '🗺️', name_hindi: 'क्षेत्रीय', name_english: 'Regional' },
            { id: 'business', icon: '💼', name_hindi: 'व्यापार', name_english: 'Business' },
            { id: 'sports', icon: '🏏', name_hindi: 'खेल', name_english: 'Sports' },
            { id: 'education', icon: '📚', name_hindi: 'शिक्षा', name_english: 'Education' }
        ];

        function renderLanguageFilters() {
            const container = document.getElementById('langFilters');
            container.innerHTML = languageFilters.map(filter => `
                <button class="lang-filter ${currentLanguageFilter === filter.id ? 'active' : ''}" onclick="setLanguageFilter('${filter.id}')">
                    ${filter.icon} ${currentUILanguage === 'hindi' ? filter.name_hindi : filter.name_english}
                </button>
            `).join('');
        }

        function setLanguageFilter(langId) {
            currentLanguageFilter = langId;
            renderLanguageFilters();
            renderDoors();
        }

        function renderCategories() {
            const container = document.getElementById('categoryDoors');
            container.innerHTML = categoryList.map(cat => `
                <button class="category-door ${currentCategory === cat.id ? 'active' : ''}" onclick="switchCategory('${cat.id}')">
                    ${cat.icon} ${currentUILanguage === 'hindi' ? cat.name_hindi : cat.name_english}
                </button>
            `).join('');
        }

        function switchCategory(categoryId) {
            currentCategory = categoryId;
            renderCategories();
            renderDoors();
        }

        function toggleFavPanel() {
            const panel = document.getElementById('favPanel');
            const overlay = document.getElementById('overlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('active');
            if (panel.classList.contains('open')) loadFavList();
        }

        async function loadFavList() {
            const items = await getAllFavorites();
            const container = document.getElementById('favList');
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">⭐ No favorites yet. Click "⭐ Save" on any newspaper!</div>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="fav-item">
                    <div class="news-title">${currentUILanguage === 'hindi' ? item.name_hindi : item.name_english}</div>
                    <div class="news-description">${currentUILanguage === 'hindi' ? item.description_hindi : item.description_english}</div>
                    <div class="news-detail">
                        <span class="badge ${item.language === 'hindi' ? 'hindi' : (item.language === 'english' ? 'english' : item.language)}">${item.language.toUpperCase()}</span>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn read" onclick="window.open('${item.link}', '_blank')">📖 Read</button>
                        <button class="action-btn save" onclick="removeFavAndRefresh('${item.id}')">🗑️ Remove</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleFavorite(item, category, event) {
            const id = `${category}_${item.name_english.replace(/\s/g, '_')}_${item.language}`;
            const isFav = await isItemFavorite(id);
            
            if (!isFav) {
                const itemWithCategory = { ...item, category: category };
                await addToFavorites(itemWithCategory);
                if (event && event.target) {
                    event.target.innerHTML = '⭐ Saved';
                    event.target.classList.add('saved');
                    event.target.disabled = true;
                }
            } else {
                await removeFromFavorites(id);
                if (event && event.target) {
                    event.target.innerHTML = '⭐ Save';
                    event.target.classList.remove('saved');
                }
            }
            renderDoors();
        }

        async function removeFavAndRefresh(id) {
            await removeFromFavorites(id);
            loadFavList();
            renderDoors();
        }

        function getLanguageBadgeClass(language) {
            const badges = {
                'hindi': 'hindi', 'english': 'english', 'tamil': 'tamil',
                'telugu': 'telugu', 'kannada': 'kannada', 'malayalam': 'malayalam',
                'bengali': 'bengali', 'marathi': 'marathi', 'gujarati': 'gujarati',
                'punjabi': 'punjabi', 'both': 'free'
            };
            return badges[language] || 'free';
        }

        async function renderDoors() {
            const container = document.getElementById('doorsContainer');
            const searchInput = document.getElementById('searchBox');
            searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            let categoriesToRender = [currentCategory];
            
            if (currentCategory === 'national') categoriesToRender = ['national'];
            else if (currentCategory === 'hindi') categoriesToRender = ['hindi'];
            else if (currentCategory === 'regional') categoriesToRender = ['regional'];
            else if (currentCategory === 'business') categoriesToRender = ['business'];
            else if (currentCategory === 'sports') categoriesToRender = ['sports'];
            else if (currentCategory === 'education') categoriesToRender = ['education'];
            
            let allHtml = '';
            
            for (const cat of categoriesToRender) {
                const data = NEWSPAPERS_DATA[cat];
                if (!data) continue;
                
                let filteredItems = data.items.filter(item => {
                    const matchesSearch = !searchTerm || 
                        (currentUILanguage === 'hindi' ? item.name_hindi : item.name_english).toLowerCase().includes(searchTerm) ||
                        item.description_hindi.toLowerCase().includes(searchTerm) ||
                        item.description_english.toLowerCase().includes(searchTerm);
                    
                    const matchesLangFilter = currentLanguageFilter === 'all' || 
                        (currentLanguageFilter === 'regional' && item.language !== 'hindi' && item.language !== 'english') ||
                        item.language === currentLanguageFilter;
                    
                    return matchesSearch && matchesLangFilter;
                });
                
                if (filteredItems.length === 0 && searchTerm) continue;
                
                allHtml += `
                    <div class="door-card">
                        <div class="door-header ${cat}">
                            <span class="door-icon">${data.icon}</span>
                            <div class="door-title">${currentUILanguage === 'hindi' ? data.name_hindi : data.name_english}</div>
                        </div>
                        <div class="door-content">
                            ${filteredItems.map(item => {
                                const itemId = `${cat}_${item.name_english.replace(/\s/g, '_')}_${item.language}`;
                                return `
                                    <div class="news-card">
                                        <div class="news-title">${currentUILanguage === 'hindi' ? item.name_hindi : item.name_english}</div>
                                        <div class="news-description">${currentUILanguage === 'hindi' ? item.description_hindi : item.description_english}</div>
                                        <div class="news-detail">
                                            <span class="badge ${getLanguageBadgeClass(item.language)}">${item.language.toUpperCase()}</span>
                                            ${item.exam_relevance ? `<span class="badge free">📚 ${item.exam_relevance}</span>` : ''}
                                            <span class="badge free">🎓 निःशुल्क</span>
                                        </div>
                                        <div class="card-actions">
                                            <button class="action-btn read" onclick="window.open('${item.link}', '_blank')">📖 पढ़ें / Read</button>
                                            <button class="action-btn save" onclick="toggleFavorite(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${cat}', event)">⭐ सेव करें</button>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                            ${filteredItems.length === 0 ? '<div class="empty-state">📭 कोई समाचार पत्र नहीं मिला / No newspapers found</div>' : ''}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = allHtml || '<div class="empty-state">📭 कोई समाचार पत्र नहीं मिला / No newspapers found</div>';
        }

        function toggleUILanguage() {
            currentUILanguage = currentUILanguage === 'hindi' ? 'english' : 'hindi';
            const langBtn = document.querySelector('.lang-toggle');
            langBtn.innerHTML = currentUILanguage === 'hindi' ? '🇬🇧 English' : '🇮🇳 हिंदी';
            renderLanguageFilters();
            renderCategories();
            renderDoors();
        }

        function handleSearch() { renderDoors(); }

        async function init() {
            await openDatabase();
            renderLanguageFilters();
            renderCategories();
            renderDoors();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
        }
        
        init();
    </script>
</body>
</html>
