<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Study Material Hub | Dil-Ke-AnnS Career Saathi</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #F5F0E8; padding-bottom: 70px; color: #2D2A24; }
        .header { background: linear-gradient(135deg, #1B4D3E 0%, #0D3B2F 100%); padding: 12px 16px 16px 16px; border-radius: 0 0 24px 24px; color: white; position: sticky; top: 0; z-index: 100; }
        .back-button { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 40px; font-size: 12px; cursor: pointer; margin-bottom: 8px; width: fit-content; }
        .logo-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 28px; }
        .logo h1 { font-size: 16px; font-weight: 700; }
        .logo p { font-size: 8px; opacity: 0.85; }
        .tagline { font-size: 9px; text-align: center; margin: 6px 0 0; opacity: 0.9; }
        .container { padding: 16px; max-width: 1400px; margin: 0 auto; }
        .page-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; color: #1B4D3E; border-left: 4px solid #E67E22; padding-left: 12px; }
        .page-subtitle { font-size: 11px; color: #64748B; margin-bottom: 16px; padding-left: 16px; }
        .search-bar { background: white; border-radius: 50px; padding: 8px 16px; display: flex; gap: 10px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 1px solid #E8E2D9; }
        .search-bar input { flex:1; border: none; outline: none; font-size: 13px; background: transparent; }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .filter-chip { background: white; padding: 6px 14px; border-radius: 40px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid #E8E2D9; transition: all 0.2s; }
        .filter-chip.active { background: #E67E22; color: white; border-color: #E67E22; }
        .category-card { background: white; border-radius: 20px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #E8E2D9; }
        .category-header { background: white; padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #F0EADF; }
        .category-title { font-size: 16px; font-weight: 700; color: #1B4D3E; display: flex; align-items: center; gap: 10px; }
        .category-arrow { font-size: 14px; color: #E67E22; transition: transform 0.3s; }
        .category-card.open .category-arrow { transform: rotate(180deg); }
        .category-content { display: none; padding: 16px; background: white; }
        .category-card.open .category-content { display: block; }
        .material-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .material-card { background: #F8F9FA; border-radius: 16px; padding: 14px; transition: all 0.2s; border: 1px solid #E8E2D9; }
        .material-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); border-color: #E67E22; }
        .material-title { font-size: 14px; font-weight: 700; color: #1B4D3E; margin-bottom: 6px; }
        .material-meta { font-size: 10px; color: #64748B; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
        .badge { background: #E8E2D9; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; color: #1B4D3E; }
        .material-desc { font-size: 11px; color: #2D2A24; margin-bottom: 12px; line-height: 1.4; }
        .material-link { display: inline-flex; align-items: center; gap: 6px; background: #E67E22; color: white; padding: 6px 12px; border-radius: 30px; font-size: 10px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
        .material-link:hover { background: #D35400; }
        .no-results { text-align: center; padding: 40px; color: #64748B; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 6px 12px 16px; border-top: 1px solid #E8E2D9; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 8px; border-radius: 30px; }
        .nav-item span:first-child { font-size: 18px; }
        .nav-item span:last-child { font-size: 8px; color: #64748B; }
        .offline-status { position: fixed; bottom: 80px; right: 16px; background: #E67E22; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; z-index: 200; display: none; }
    </style>
</head>

            items: [

                { name: "Indian Geography Notes", desc: "Physical, Economic, Social Geography", type: "notes", subject: "Geography", link: "#" },

        roadmap: {

            items: [
                { name: "Medical Career Roadmap", desc: "From 10th to MBBS/MD – salary ₹6-50 LPA", type: "roadmap", stream: "Medical", link: "#" },

                { name: "Sports Career Roadmap", desc: "BPEd, sports academies, govt jobs", type: "roadmap", stream: "Sports", link: "#" },
                { name: "Agriculture Roadmap", desc: "B.Sc Agri, agribusiness, govt schemes", type: "roadmap", stream: "Agriculture", link: "#" },
                { name: "Artist Roadmap", desc: "BFA, fine arts, freelancing", type: "roadmap", stream: "Artist", link: "#" },
                { name: "Designing Roadmap", desc: "NIFT, NID, fashion, graphic design", type: "roadmap", stream: "Designing", link: "#" },
                { name: "Skilled (ITI/Diploma) Roadmap", desc: "Vocational training, early jobs", type: "roadmap", stream: "Skilled", link: "#" },
                { name: "Abroad Studies Roadmap", desc: "SAT, IELTS, TOEFL, country guides", type: "roadmap", stream: "Abroad", link: "#" }

                { name: "Medical - Top Courses", desc: "MBBS, BDS, BAMS, BHMS, BPT, Nursing", type: "stream", stream: "Medical", link: "#" },

            items: [
                { name: "Study IQ Education", desc: "UPSC, SSC, Banking, Current Affairs", type: "resource", link: "https://www.youtube.com/@StudyIQEducation" },

    // Flatten items for search
    let allItems = [];
    for (let cat in studyData) {
        studyData[cat].items.forEach(item => { allItems.push({ ...item, category: cat }); });
    }

    let currentFilter = "all";
    let currentSearch = "";

    function renderCategories() {
        const container = document.getElementById("categoriesContainer");
        container.innerHTML = "";
        for (let catKey in studyData) {
            const cat = studyData[catKey];
            let filteredItems = cat.items.filter(item => {
                if (currentFilter !== "all" && item.type !== currentFilter) return false;
                if (currentSearch && !item.name.toLowerCase().includes(currentSearch) && !item.desc.toLowerCase().includes(currentSearch) && !(item.subject && item.subject.toLowerCase().includes(currentSearch)) && !(item.exam && item.exam.toLowerCase().includes(currentSearch)) && !(item.stream && item.stream.toLowerCase().includes(currentSearch))) return false;
                return true;
            });
            if (filteredItems.length === 0) continue;
            const card = document.createElement("div");
            card.className = "category-card";
            card.innerHTML = `<div class="category-header"><div class="category-title">${cat.title}</div><div class="category-arrow">▼</div></div><div class="category-content"><div class="material-grid" id="grid-${catKey}"></div></div>`;
            container.appendChild(card);
            const grid = card.querySelector(`#grid-${catKey}`);
            filteredItems.forEach(item => {
                const cardHtml = `<div class="material-card"><div class="material-title">${escapeHtml(item.name)}</div><div class="material-meta"><span class="badge">${item.type.toUpperCase()}</span>${item.exam ? `<span class="badge">${escapeHtml(item.exam)}</span>` : ""}${item.subject ? `<span class="badge">${escapeHtml(item.subject)}</span>` : ""}${item.class ? `<span class="badge">Class ${escapeHtml(item.class)}</span>` : ""}${item.stream ? `<span class="badge">${escapeHtml(item.stream)}</span>` : ""}</div><div class="material-desc">${escapeHtml(item.desc)}</div><a href="${item.link}" class="material-link" target="_blank">🔗 View / Download</a></div>`;
                grid.innerHTML += cardHtml;
            });
            const header = card.querySelector(".category-header");
            header.addEventListener("click", () => { card.classList.toggle("open"); });
            if (catKey === "ncert") card.classList.add("open");
        }
        if (container.innerHTML === "") container.innerHTML = `<div class="no-results">📭 No results found.</div>`;
    }

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    document.getElementById("searchInput").addEventListener("input", (e) => { currentSearch = e.target.value.toLowerCase(); renderCategories(); });
    document.querySelectorAll(".filter-chip").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".filter-chip").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentFilter = btn.getAttribute("data-filter"); renderCategories(); }); });

    const bottomNav = [{ name: "Home", icon: "🏠", link: "index.html" }, { name: "Search", icon: "🔍", link: "#" }, { name: "AnnS AI", icon: "🤖", link: "something_interesting.html" }, { name: "Alerts", icon: "🔔", link: "#" }, { name: "Profile", icon: "👤", link: "#" }];
    document.getElementById("bottomBar").innerHTML = bottomNav.map(item => `<div class="nav-item" data-link="${item.link}"><span>${item.icon}</span><span>${item.name}</span></div>`).join('');
    document.querySelectorAll('.nav-item').forEach(nav => nav.addEventListener('click', () => { const link = nav.getAttribute('data-link'); if (link && link !== '#') window.location.href = link; else alert("Feature coming soon"); }));
    function goBack() { window.location.href = 'index.html'; }

    renderCategories();
</script>
</body>
</html>
