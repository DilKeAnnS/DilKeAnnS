<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Jobs & Exams - Dil-Ke-AnnS Career Saathi</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Header */
        .app-header {
            background: rgba(255,255,255,0.98);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        h1 {
            color: #667eea;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            margin-left: auto;
        }

        .search-box {
            width: 100%;
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102,126,234,0.3);
        }

        /* Stream Selector */
        .stream-selector {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .stream-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .stream-door {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stream-door:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .stream-door.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Main Doors Container */
        .doors-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Individual Door Card */
        .door-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeInUp 0.5s ease;
        }

        .door-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .door-header {
            padding: 20px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
        }

        .door-header.govt { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .door-header.private { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .door-header.exam { background: linear-gradient(135deg, #fa709a, #fee140); color: #333; }
        .door-header.abroad { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #333; }

        .door-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .door-title {
            font-size: 1.3rem;
        }

        .door-content {
            max-height: 500px;
            overflow-y: auto;
            padding: 15px;
        }

        /* Custom Scrollbar */
        .door-content::-webkit-scrollbar {
            width: 6px;
        }

        .door-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .door-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        /* Item Cards Inside Doors */
        .job-card, .exam-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
            border-left: 4px solid #667eea;
        }

        .job-card:hover, .exam-card:hover {
            background: #e8eaff;
            transform: translateX(5px);
        }

        .item-title {
            font-weight: bold;
            color: #333;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .item-description {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .item-detail {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.govt { background: #4caf50; color: white; }
        .badge.private { background: #2196f3; color: white; }
        .badge.exam { background: #ff9800; color: white; }
        .badge.abroad { background: #9c27b0; color: white; }

        .official-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.75rem;
            margin-top: 8px;
            font-weight: 500;
        }

        .official-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .doors-container {
                grid-template-columns: 1fr;
                padding: 15px;
                gap: 15px;
            }
            
            .stream-door {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            .door-header {
                padding: 15px;
            }
            
            .door-icon {
                font-size: 2rem;
            }
            
            .door-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

                    { name: "SAT", description: "Scholastic Assessment Test (UG Abroad)", eligibility: "10+2", officialLink: "https://www.collegeboard.org/sat" },
                    { name: "PTE", description: "Pearson Test of English (UK/Australia)", eligibility: "10+2/Graduate", officialLink: "https://www.pearsonpte.com/" },
                    { name: "Duolingo Test", description: "Online English Test (Accepted by 4000+ univ)", eligibility: "10+2/Graduate", officialLink: "https://englishtest.duolingo.com/" }
                ],
                abroad_jobs: [
                    { title: "USA OPT/H1B", description: "Optional Practical Training (3 years STEM) + H1B Work Visa", eligibility: "US Degree", officialLink: "https://www.uscis.gov/" },
                    { title: "UK Graduate Route", description: "2 Years Work Visa after UK degree", eligibility: "UK Bachelor/Masters", officialLink: "https://www.gov.uk/graduate-visa" },
                    { title: "Canada PGWP", description: "Post-Graduation Work Permit (up to 3 years)", eligibility: "Canadian DLI Degree", officialLink: "https://www.canada.ca/en/immigration-refugees-citizenship.html" },
                    { title: "Australia 485 Visa", description: "Temporary Graduate Visa (2-4 years work)", eligibility: "Australian Degree", officialLink: "https://immi.homeaffairs.gov.au/" },
                    { title: "Germany Job Seeker", description: "6-18 months visa to find job after German degree", eligibility: "German University Degree", officialLink: "https://www.make-it-in-germany.com/" },
                    { title: "Ireland Stay Back", description: "2 years stay back after Masters", eligibility: "Irish Masters Degree", officialLink: "https://www.educationinireland.com/" }
                ],
                scholarships: [
                    { name: "Fulbright-Nehru", description: "USA - Masters/PhD - Full scholarship", eligibility: "Graduate + English", officialLink: "https://www.usief.org.in/" },
                    { name: "Chevening", description: "UK - 1 year Masters - Full scholarship", eligibility: "Graduate + 2 years exp", officialLink: "https://www.chevening.org/" },
                    { name: "Commonwealth", description: "UK/Canada - Masters/PhD", eligibility: "Graduate", officialLink: "https://cscuk.fcdo.gov.uk/" },
                    { name: "Erasmus Mundus", description: "Europe - Joint Masters", eligibility: "Graduate", officialLink: "https://erasmus-plus.ec.europa.eu/" },
                    { name: "DAAD Scholarship", description: "Germany - Masters/Research", eligibility: "Graduate (55%+)", officialLink: "https://www.daad.de/en/" }
                ]
            }
        };

        // State
        let currentStream = 'medical';
        let searchTerm = '';

        // Render stream doors (selector)
        function renderStreamSelector() {
            const streamsList = [
                { id: 'medical', name: '🩺 Medical', emoji: '🩺' },
                { id: 'non_medical', name: '🔧 Non-Medical', emoji: '🔧' },
                { id: 'commerce', name: '📊 Commerce', emoji: '📊' },
                { id: 'arts', name: '🎭 Arts', emoji: '🎭' },
                { id: 'sports', name: '⚽ Sports', emoji: '⚽' },
                { id: 'agriculture', name: '🌾 Agriculture', emoji: '🌾' },
                { id: 'artist', name: '🎨 Artist', emoji: '🎨' },
                { id: 'designing', name: '✏️ Designing', emoji: '✏️' },
                { id: 'skilled_trade', name: '🔨 Skilled Trade', emoji: '🔨' },
                { id: 'abroad_studies', name: '🌍 Abroad Studies', emoji: '🌍' }
            ];

            const container = document.getElementById('streamGrid');
            container.innerHTML = streamsList.map(stream => `
                <button class="stream-door ${currentStream === stream.id ? 'active' : ''}" onclick="switchStream('${stream.id}')">
                    ${stream.emoji} ${stream.name}
                </button>
            `).join('');
        }

        // Switch stream
        window.switchStream = function(streamId) {
            currentStream = streamId;
            renderStreamSelector();
            renderDoors();
        };

        // Filter items based on search
        function filterItems(items, searchTerm) {
            if (!searchTerm) return items;
            const term = searchTerm.toLowerCase();
            return items.filter(item => 
                item.title?.toLowerCase().includes(term) || 
                item.name?.toLowerCase().includes(term) ||
                item.description?.toLowerCase().includes(term) ||
                item.eligibility?.toLowerCase().includes(term)
            );
        }

        // Render main doors (4 doors: Exams, Govt, Private, Abroad)
        function renderDoors() {
            const data = STREAMS_DATA[currentStream];
            if (!data) return;

            const searchTermInput = document.getElementById('searchBox');
            searchTerm = searchTermInput ? searchTermInput.value : '';

            // Filter all sections
            const filteredExams = filterItems(data.exams || [], searchTerm);
            const filteredGovt = filterItems(data.govt_jobs || [], searchTerm);
            const filteredPrivate = filterItems(data.private_jobs || [], searchTerm);
            const filteredAbroad = filterItems(data.abroad || data.abroad_jobs || [], searchTerm);
            const filteredScholarships = filterItems(data.scholarships || [], searchTerm);

            const container = document.getElementById('doorsContainer');
            
            let html = `
                <!-- Door 1: Important Exams -->
                <div class="door-card">
                    <div class="door-header exam">
                        <span class="door-icon">📝</span>
                        <div class="door-title">Important Exams</div>
                    </div>
                    <div class="door-content">
                        ${filteredExams.length > 0 ? filteredExams.map(exam => `
                            <div class="exam-card">
                                <div class="item-title">📖 ${exam.name}</div>
                                <div class="item-description">${exam.description}</div>
                                <div class="item-detail">🎯 Eligibility: ${exam.eligibility || 'Varies'}</div>
                                ${exam.frequency ? `<div class="item-detail">📅 Frequency: ${exam.frequency}</div>` : ''}
                                <a href="${exam.officialLink}" target="_blank" class="official-link">🔗 Official Website →</a>
                            </div>
                        `).join('') : '<div class="empty-state">🔍 No exams found matching your search</div>'}
                    </div>
                </div>

                <!-- Door 2: Government Jobs -->
                <div class="door-card">
                    <div class="door-header govt">
                        <span class="door-icon">🏛️</span>
                        <div class="door-title">Government Jobs</div>
                    </div>
                    <div class="door-content">
                        ${filteredGovt.length > 0 ? filteredGovt.map(job => `
                            <div class="job-card">
                                <div class="item-title">${job.title}</div>
                                <div class="item-description">${job.description}</div>
                                <div class="item-detail">✅ Eligibility: ${job.eligibility || 'Varies'}</div>
                                ${job.salary ? `<div class="item-detail">💰 Salary: ${job.salary}</div>` : ''}
                                <a href="${job.officialLink}" target="_blank" class="official-link">🔗 Apply/Details →</a>
                            </div>
                        `).join('') : '<div class="empty-state">🔍 No government jobs found matching your search</div>'}
                    </div>
                </div>

                <!-- Door 3: Private Jobs -->
                <div class="door-card">
                    <div class="door-header private">
                        <span class="door-icon">💼</span>
                        <div class="door-title">Private Jobs</div>
                    </div>
                    <div class="door-content">
                        ${filteredPrivate.length > 0 ? filteredPrivate.map(job => `
                            <div class="job-card">
                                <div class="item-title">${job.title}</div>
                                <div class="item-description">${job.description}</div>
                                <div class="item-detail">✅ Eligibility: ${job.eligibility || 'Varies'}</div>
                                ${job.salary ? `<div class="item-detail">💰 Salary: ${job.salary}</div>` : ''}
                                <a href="${job.officialLink}" target="_blank" class="official-link">🔗 Careers →</a>
                            </div>
                        `).join('') : '<div class="empty-state">🔍 No private jobs found matching your search</div>'}
                    </div>
                </div>

                <!-- Door 4: Abroad Opportunities -->
                <div class="door-card">
                    <div class="door-header abroad">
                        <span class="door-icon">🌏</span>
                        <div class="door-title">Abroad Opportunities</div>
                    </div>
                    <div class="door-content">
                        ${filteredAbroad.length > 0 ? filteredAbroad.map(job => `
                            <div class="job-card">
                                <div class="item-title">✈️ ${job.title}</div>
                                <div class="item-description">${job.description}</div>
                                <div class="item-detail">✅ Eligibility: ${job.eligibility || 'Varies'}</div>
                                <a href="${job.officialLink}" target="_blank" class="official-link">🔗 Official Info →</a>
                            </div>
                        `).join('') : ''}
                        ${filteredScholarships.length > 0 ? `<div style="margin-top:15px;"><div class="item-title" style="margin-bottom:10px;">🎓 Scholarships:</div>` + filteredScholarships.map(sch => `
                            <div class="exam-card">
                                <div class="item-title">${sch.name}</div>
                                <div class="item-description">${sch.description}</div>
                                <div class="item-detail">✅ Eligibility: ${sch.eligibility || 'Varies'}</div>
                                <a href="${sch.officialLink}" target="_blank" class="official-link">🔗 Apply →</a>
                            </div>
                        `).join('') + '</div>' : ''}
                        ${filteredAbroad.length === 0 && filteredScholarships.length === 0 ? '<div class="empty-state">🔍 No abroad opportunities found matching your search</div>' : ''}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // Search handler
        function handleSearch() {
            renderDoors();
        }

        // Initialize        function init() {
            renderStreamSelector();
            renderDoors();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
        }

        init();
    </script>
</body>
</html>
