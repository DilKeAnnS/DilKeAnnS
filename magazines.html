    <script>
        // INDEXEDDB SETUP
        const DB_NAME = 'MagazineLibraryDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'saved_magazines';
        let db = null;
        
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('date', 'date');
                        store.createIndex('category', 'category');
                    }
                };
            });
        }
        
        async function saveToLibrary(item) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const savedItem = { id: `${item.category}_${item.name_english.replace(/\s/g, '_')}`, ...item, date: new Date().toISOString() };
            return new Promise((resolve) => {
                const request = store.add(savedItem);
                request.onsuccess = () => resolve(true);
                request.onerror = () => resolve(false);
            });
        }
        
        async function removeFromLibrary(id) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.delete(id);
                request.onsuccess = () => resolve(true);
            });
        }
        
        async function getAllSavedItems() {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }
        
        async function isItemSaved(id) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.get(id);
                request.onsuccess = () => resolve(!!request.result);
            });
        }

        function renderCategories() {
            const categories = [
                { id: 'daily', icon: '📰', name_hindi: 'दैनिक (8)', name_english: 'Daily (8)' },
                { id: 'monthly', icon: '📖', name_hindi: 'मासिक (12+)', name_english: 'Monthly (12+)' },
                { id: 'quarterly', icon: '🗓️', name_hindi: 'त्रैमासिक (6+)', name_english: 'Quarterly (6+)' },
                { id: 'yearly', icon: '📚', name_hindi: 'वार्षिक (8+)', name_english: 'Yearly (8+)' },
                { id: 'exam', icon: '🎯', name_hindi: 'परीक्षा (12+)', name_english: 'Exam (12+)' },
                { id: 'stream', icon: '📖', name_hindi: 'सभी 10 स्ट्रीम', name_english: 'All 10 Streams' }
            ];
            const container = document.getElementById('categoryDoors');
            container.innerHTML = categories.map(cat => `
                <button class="category-door ${currentCategory === cat.id ? 'active' : ''}" onclick="switchCategory('${cat.id}')">
                    ${cat.icon} ${currentLang === 'hindi' ? cat.name_hindi : cat.name_english}
                </button>
            `).join('');
        }

        function switchCategory(categoryId) {
            currentCategory = categoryId;
            renderCategories();
            renderDoors();
        }

        function openPDF(url, title) {
            const modal = document.getElementById('pdfModal');
            const frame = document.getElementById('pdfFrame');
            document.getElementById('pdfTitle').textContent = title;
            frame.src = url;
            modal.style.display = 'block';
        }

        function closePDF() {
            const modal = document.getElementById('pdfModal');
            const frame = document.getElementById('pdfFrame');
            modal.style.display = 'none';
            frame.src = '';
        }

        function toggleLibrary() {
            const panel = document.getElementById('libraryPanel');
            const overlay = document.getElementById('overlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('active');
            if (panel.classList.contains('open')) loadLibraryList();
        }

        async function loadLibraryList() {
            const items = await getAllSavedItems();
            const container = document.getElementById('libraryList');
            if (items.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">📭 No saved items yet. Click "📥 Save to Library" on any magazine!</div>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="library-item">
                    <div class="mag-title">${currentLang === 'hindi' ? item.name_hindi : item.name_english}</div>
                    <div class="mag-description">${currentLang === 'hindi' ? item.description_hindi : item.description_english}</div>
                    <div class="card-actions">
                        <button class="action-btn read" onclick="openPDF('${item.pdfLink}', '${item.name_english}')">📖 Read</button>
                        <button class="action-btn delete" onclick="removeFromLibraryAndRefresh('${item.id}')">🗑️ Remove</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveItemToLibrary(item, category) {
            const itemWithCategory = { ...item, category };
            const saved = await saveToLibrary(itemWithCategory);
            if (saved) {
                alert('✅ Saved to your library! Click "📚 मेरी लाइब्रेरी" to view offline.');
                renderDoors();
            }
        }

        async function removeFromLibraryAndRefresh(id) {
            await removeFromLibrary(id);
            loadLibraryList();
            renderDoors();
        }

        async function renderDoors() {
            const data = MAGAZINES_DATA[currentCategory];
            if (!data) return;
            const searchInput = document.getElementById('searchBox');
            searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            const container = document.getElementById('doorsContainer');
            
            if (currentCategory === 'stream') {
                const streams = data.items;
                let html = '';
                const streamOrder = ['medical', 'non_medical', 'commerce', 'arts', 'sports', 'agriculture', 'artist', 'designing', 'skilled_trade', 'abroad_studies'];
                
                for (const streamKey of streamOrder) {
                    const streamData = streams[streamKey];
                    if (!streamData) continue;
                    
                    let filteredResources = streamData.resources.filter(res => 
                        !searchTerm || 
                        (currentLang === 'hindi' ? res.name_hindi : res.name_english).toLowerCase().includes(searchTerm) ||
                        (currentLang === 'hindi' ? res.description_hindi : res.description_english).toLowerCase().includes(searchTerm)
                    );
                    
                    if (filteredResources.length === 0 && searchTerm) continue;
                    
                    const streamIcons = {
                        medical: '🩺', non_medical: '🔧', commerce: '📊', arts: '🎭',
                        sports: '⚽', agriculture: '🌾', artist: '🎨', designing: '✏️',
                        skilled_trade: '🔨', abroad_studies: '🌍'
                    };
                    
                    html += `
                        <div class="door-card">
                            <div class="door-header stream">
                                <span class="door-icon">${streamIcons[streamKey] || '📖'}</span>
                                <div class="door-title">${currentLang === 'hindi' ? streamData.name_hindi : streamData.name_english}</div>
                            </div>
                            <div class="door-content">
                                ${filteredResources.map(res => `
                                    <div class="mag-card">
                                        <div class="mag-title">${currentLang === 'hindi' ? res.name_hindi : res.name_english}</div>
                                        <div class="mag-description">${currentLang === 'hindi' ? res.description_hindi : res.description_english}</div>
                                        <div class="mag-detail">
                                            <span class="badge pdf">📄 PDF</span>
                                            ${res.language === 'both' ? '<span class="badge hindi">🇮🇳 हिंदी</span><span class="badge english">🇬🇧 English</span>' : (res.language === 'hindi' ? '<span class="badge hindi">🇮🇳 हिंदी</span>' : '<span class="badge english">🇬🇧 English</span>')}
                                            <span class="badge free">🎓 निःशुल्क</span>
                                        </div>
                                        <div class="card-actions">
                                            <button class="action-btn read" onclick="openPDF('${res.pdfLink}', '${res.name_english.replace(/'/g, "\\'")}')">📖 Read Online</button>
                                            <button class="action-btn save" onclick="saveItemToLibrary({
                                                name_hindi: '${res.name_hindi.replace(/'/g, "\\'")}',
                                                name_english: '${res.name_english.replace(/'/g, "\\'")}',
                                                description_hindi: '${res.description_hindi.replace(/'/g, "\\'")}',
                                                description_english: '${res.description_english.replace(/'/g, "\\'")}',
                                                pdfLink: '${res.pdfLink}',
                                                language: '${res.language}'
                                            }, '${currentCategory}')">📥 Save to Library</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html || '<div class="empty-state">📭 No matching resources found</div>';
                return;
            }
            
            // Non-stream categories
            let filteredItems = data.items.filter(item => 
                !searchTerm || 
                (currentLang === 'hindi' ? item.name_hindi : item.name_english).toLowerCase().includes(searchTerm) ||
                (currentLang === 'hindi' ? item.description_hindi : item.description_english).toLowerCase().includes(searchTerm)
            );
            
            let html = `
                <div class="door-card">
                    <div class="door-header ${currentCategory}">
                        <span class="door-icon">${currentCategory === 'daily' ? '📰' : currentCategory === 'monthly' ? '📖' : currentCategory === 'quarterly' ? '🗓️' : currentCategory === 'yearly' ? '📚' : '🎯'}</span>
                        <div class="door-title">${currentLang === 'hindi' ? data.name_hindi : data.name_english}</div>
                    </div>
                    <div class="door-content">
                        ${filteredItems.map(item => `
                            <div class="mag-card">
                                <div class="mag-title">${currentLang === 'hindi' ? item.name_hindi : item.name_english}</div>
                                <div class="mag-description">${currentLang === 'hindi' ? item.description_hindi : item.description_english}</div>
                                <div class="mag-detail">
                                    <span class="badge pdf">📄 PDF</span>
                                    ${item.language === 'both' ? '<span class="badge hindi">🇮🇳 हिंदी</span><span class="badge english">🇬🇧 English</span>' : (item.language === 'hindi' ? '<span class="badge hindi">🇮🇳 हिंदी</span>' : '<span class="badge english">🇬🇧 English</span>')}
                                    <span class="badge free">🎓 निःशुल्क</span>
                                </div>
                                <div class="card-actions">
                                    <button class="action-btn read" onclick="openPDF('${item.pdfLink}', '${item.name_english.replace(/'/g, "\\'")}')">📖 Read Online</button>
                                    <button class="action-btn save" onclick="saveItemToLibrary({
                                        name_hindi: '${item.name_hindi.replace(/'/g, "\\'")}',
                                        name_english: '${item.name_english.replace(/'/g, "\\'")}',
                                        description_hindi: '${item.description_hindi.replace(/'/g, "\\'")}',
                                        description_english: '${item.description_english.replace(/'/g, "\\'")}',
                                        pdfLink: '${item.pdfLink}',
                                        language: '${item.language}'
                                    }, '${currentCategory}')">📥 Save to Library</button>
                                </div>
                            </div>
                        `).join('')}
                        ${filteredItems.length === 0 ? '<div class="empty-state">🔍 No magazines found matching your search</div>' : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'hindi' ? 'english' : 'hindi';
            const langBtn = document.querySelector('.lang-toggle');
            langBtn.innerHTML = currentLang === 'hindi' ? '🇬🇧 English' : '🇮🇳 हिंदी';
            renderCategories();
            renderDoors();
        }

        function handleSearch() { renderDoors(); }

        async function init() {
            await openDatabase();
            renderCategories();
            renderDoors();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
        }
        init();
    </script>
