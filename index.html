<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        background: #F5F0E8;  /* Warm off-white - comfortable for eyes */
        padding-bottom: 80px;
        color: #2D2A24;
        font-size: 18px;
        line-height: 1.5;
    }

    /* Header */
    .header {
        background: #1B4D3E;  /* Dark green - calm, natural */
        padding: 20px 20px 35px 20px;
        border-radius: 0 0 30px 30px;
        color: white;
    }

    .logo-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .logo h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .logo p {
        font-size: 14px;
        opacity: 0.85;
        margin-top: 4px;
    }

    .tagline {
        font-size: 18px;
        opacity: 0.95;
        margin: 12px 0 8px 0;
        font-weight: 500;
        text-align: center;
    }

    .notification-icon {
        font-size: 28px;
        cursor: pointer;
        background: rgba(255,255,255,0.2);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Welcome message */
    .welcome {
        background: rgba(255,255,255,0.15);
        padding: 8px 16px;
        border-radius: 40px;
        font-size: 16px;
        display: inline-block;
        margin: 8px 0;
        text-align: center;
        width: 100%;
    }

    /* Search Section */
    .hero {
        margin-top: 12px;
    }

    .search-bar {
        background: white;
        border-radius: 60px;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .search-bar span:first-child {
        font-size: 24px;
        color: #64748B;
    }

    .search-bar input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 18px;
        background: transparent;
        padding: 8px 0;
    }

    .search-bar input::placeholder {
        color: #94A3B8;
        font-size: 16px;
    }

    .ask-ai {
        background: #E67E22;  /* Warm orange - attention grabbing */
        padding: 10px 20px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 700;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        color: white;
        animation: pulse 2s ease-in-out infinite;
    }

    .ask-ai:hover {
        transform: scale(1.02);
        background: #D35400;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }

    /* Main Container */
    .container {
        padding: 25px 16px 20px 16px;
    }

    .section-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 20px;
        color: #2D2A24;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* Tiles Grid */
    .tiles-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 30px;
    }

    .tile {
        background: white;
        border-radius: 20px;
        padding: 18px 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        border: 1px solid #E8E2D9;
    }

    .tile:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(27, 77, 62, 0.15);
        border-color: #1B4D3E;
    }

    .tile-icon {
        font-size: 38px;
        margin-bottom: 10px;
        display: block;
    }

    .tile-name {
        font-size: 15px;
        font-weight: 600;
        color: #2D2A24;
        line-height: 1.3;
    }

    /* Bottom Bar */
    .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: white;
        display: flex;
        justify-content: space-around;
        padding: 12px 16px 22px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        border-top: 1px solid #E8E2D9;
        z-index: 100;
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: all 0.2s;
        padding: 8px 16px;
        border-radius: 50px;
    }

    .nav-item span:first-child {
        font-size: 28px;
    }

    .nav-item span:last-child {
        font-size: 13px;
        font-weight: 600;
        color: #64748B;
    }

    .nav-item.active {
        background: #F0EADF;
    }

    .nav-item.active span:last-child {
        color: #1B4D3E;
        font-weight: 700;
    }

    /* Floating AI Button */
    .floating-ai {
        position: fixed;
        bottom: 90px;
        right: 20px;
        background: white;
        width: 64px;
        height: 64px;
        border-radius: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        cursor: pointer;
        z-index: 99;
        transition: transform 0.2s;
        border: 2px solid #E67E22;
    }

    .floating-ai:hover {
        transform: scale(1.05);
    }

    .floating-ai img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
    }

    /* Tablet and Desktop */
    @media (min-width: 768px) {
        .tiles-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .tile-name {
            font-size: 16px;
        }
        .tile-icon {
            font-size: 42px;
        }
    }

    /* Small Mobile Adjustments */
    @media (max-width: 480px) {
        .tile-name {
            font-size: 13px;
        }
        .tile-icon {
            font-size: 32px;
        }
        .tile {
            padding: 14px 6px;
        }
        .section-title {
            font-size: 22px;
        }
        .tagline {
            font-size: 16px;
        }
        .logo h1 {
            font-size: 24px;
        }
        .nav-item span:first-child {
            font-size: 26px;
        }
        .nav-item span:last-child {
            font-size: 12px;
        }
    }
</style>
