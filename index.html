    ];

    let currentLang = 'en';

    function t(key) {
        return translations[currentLang][key] || translations.en[key] || key;
    }

    function updateAllText() {
        document.getElementById('appTagline').textContent = t('app_tagline');
        document.getElementById('taglineText').textContent = t('tagline');
        
        const hours = new Date().getHours();
        let greeting = hours < 12 ? '🌅 ' : (hours < 17 ? '☀️ ' : '🌙 ');
        document.getElementById('welcomeMsg').innerHTML = greeting + t('welcome');
        
        document.getElementById('searchInput').placeholder = t('search_placeholder');
        document.getElementById('askAiText').textContent = t('ask_ai');
        document.getElementById('exploreTitle').innerHTML = t('explore_title');
        
        document.querySelectorAll('.tile').forEach(tile => {
            const nameKey = tile.getAttribute('data-name-key');
            const nameSpan = tile.querySelector('.tile-name');
            if (nameSpan && nameKey) nameSpan.textContent = t(nameKey);
        });
        
        document.querySelectorAll('.nav-item').forEach(item => {
            const nameKey = item.getAttribute('data-name-key');
            const nameSpan = item.querySelector('span:last-child');
            if (nameSpan && nameKey) nameSpan.textContent = t(nameKey);
        });
    }

    function changeLanguage(langCode) {
        if (!translations[langCode]) return;
        currentLang = langCode;
        localStorage.setItem('career_saathi_language', langCode);
        document.getElementById('languageSelect').value = langCode;
        updateAllText();
    }

    function renderTiles() {
        const grid = document.getElementById('tilesGrid');
        if (!grid) return;
        grid.innerHTML = tiles.map(tile => `
            <div class="tile" data-link="${tile.link}" data-name-key="${tile.nameKey}">
                <span class="tile-icon">${tile.icon}</span>
                <div class="tile-name">${t(tile.nameKey)}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.tile').forEach(tile => {
            tile.addEventListener('click', () => {
                const link = tile.getAttribute('data-link');
                if (link && link !== '#') window.location.href = link;
                else alert(`🚀 ${t(tile.getAttribute('data-name-key'))} ${t('coming_soon')}`);
            });
        });
    }

    function renderBottomBar() {
        const bar = document.getElementById('bottomBar');
        if (!bar) return;
        bar.innerHTML = bottomNav.map(item => `
            <div class="nav-item" data-link="${item.link}" data-name-key="${item.nameKey}">
                <span>${item.icon}</span>
                <span>${t(item.nameKey)}</span>
            </div>
        `).join('');
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', () => {
                const link = nav.getAttribute('data-link');
                if (link && link !== '#') window.location.href = link;
                else alert(`📱 ${t(nav.getAttribute('data-name-key'))} ${t('coming_soon')}`);
            });
        });
    }

    function setupSearch() {
        const input = document.getElementById('searchInput');
        if (input) {
            input.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    const query = e.target.value.trim();
                    alert(query ? `Searching for: "${query}"` : 'Please type something to search');
                }
            });
        }
    }

    function setupAI() {
        const askBtn = document.getElementById('askAiBtn');
        const floatingBtn = document.getElementById('floatingAiBtn');
        const openAI = () => alert(`🤖 AnnS AI Mentor\n\nDoubt Solver • Career Mentor • Debate Judge • Exam Planner`);
        if (askBtn) askBtn.addEventListener('click', openAI);
        if (floatingBtn) floatingBtn.addEventListener('click', openAI);
    }

    function setupNotifications() {
        const alertBtn = document.getElementById('alertBtn');
        if (alertBtn) {
            alertBtn.addEventListener('click', () => alert(`🔔 Notification Center\n\nExam Alerts • Govt Schemes • Job Updates`));
        }
    }

    function loadSavedLanguage() {
        const saved = localStorage.getItem('career_saathi_language');
        if (saved && translations[saved]) {
            currentLang = saved;
            document.getElementById('languageSelect').value = saved;
        }
        updateAllText();
    }

    document.getElementById('languageSelect').addEventListener('change', (e) => changeLanguage(e.target.value));
    
    renderTiles();
    renderBottomBar();
    setupSearch();
    setupAI();
    setupNotifications();
    loadSavedLanguage();
</script>
