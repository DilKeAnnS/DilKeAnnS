        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --secondary: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --dark: #1F2937;
            --light: #F9FAFB;
            --gray: #6B7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .news-ticker {
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Language Selector */
        .language-bar {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--light);
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Search Bar */
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .search-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* Feature Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .feature-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .feature-desc {
            color: var(--gray);
            font-size: 14px;
        }

        /* Offline Indicator */
        .offline-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 12px;
            display: none;
            z-index: 1000;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .feature-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>

        function showSchemes() {
            const modal = document.getElementById('modal');

            modalBody.innerHTML = `
                <h2>🏛️ Government Schemes & Scholarships</h2>
                <hr>
                <div style="max-height: 500px; overflow-y: auto;">
                    ${governmentSchemes.map(scheme => `
                        <div style="margin: 15px 0; padding: 15px; background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); border-radius: 10px;">

        function searchContent() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) return;
            
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            let results = [];
            
            // Search in career streams
            for (const [key, stream] of Object.entries(careerStreams)) {
                if (stream.name.toLowerCase().includes(query)) {
                    results.push({ type: "Career Stream", name: stream.name, data: stream });
                }
                stream.fields.forEach(field => {
                    if (field.toLowerCase().includes(query)) {
                        results.push({ type: "Career Field", name: field, stream: stream.name });
                    }
                });
            }
            
            // Search in study materials
            studyMaterials.ncert.forEach(book => {
                if (book.subject.toLowerCase().includes(query)) {
                    results.push({ type: "Study Material", name: `${book.class} ${book.subject}`, url: book.url });
                }
            });
            
            // Search in schemes
            governmentSchemes.forEach(scheme => {
                if (scheme.name.toLowerCase().includes(query)) {
                    results.push({ type: "Government Scheme", name: scheme.name, scheme: scheme });
                }
            });
            
            if (results.length === 0) {
                modalBody.innerHTML = `
                    <h2>🔍 Search Results</h2>
                    <hr>
                    <p>No results found for "${query}". Try searching for: doctor, engineer, scholarship, NCERT, etc.</p>
                    <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 20px; background: #4F46E5; color: white; border: none; border-radius: 8px; cursor: pointer;">Close</button>
                `;
            } else {
                modalBody.innerHTML = `
                    <h2>🔍 Search Results for "${query}"</h2>
                    <hr>
                    <div style="max-height: 500px; overflow-y: auto;">
                        ${results.map(result => {
                            if (result.type === "Career Stream") {
                                return `
                                    <div style="margin: 10px 0; padding: 10px; background: #f3f4f6; border-radius: 8px; cursor: pointer;" onclick="showStreamDetails('${Object.keys(careerStreams).find(k => careerStreams[k].name === result.name)}')">
                                        <strong>📊 ${result.type}:</strong> ${result.name}
                                    </div>
                                `;
                            } else if (result.type === "Career Field") {
                                return `
                                    <div style="margin: 10px 0; padding: 10px; background: #f3f4f6; border-radius: 8px;">
                                        <strong>💼 ${result.type}:</strong> ${result.name}<br>
                                        <small>Part of ${result.stream} stream</small>
                                    </div>
                                `;
                            } else if (result.type === "Study Material") {
                                return `
                                    <div style="margin: 10px 0; padding: 10px; background: #f3f4f6; border-radius: 8px;">
                                        <strong>📚 ${result.type}:</strong> ${result.name}<br>
                                        <a href="${result.url}" target="_blank" style="color: #4F46E5;">Access Material →</a>
                                    </div>
                                `;
                            } else {
                                return `
                                    <div style="margin: 10px 0; padding: 10px; background: #f3f4f6; border-radius: 8px;">
                                        <strong>🏛️ ${result.type}:</strong> ${result.name}<br>
                                        <small>${result.scheme.amount} • ${result.scheme.eligibility}</small>
                                    </div>
                                `;
                            }
                        }).join('')}
                    </div>
                    <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 20px; background: #4F46E5; color: white; border: none; border-radius: 8px; cursor: pointer;">Close</button>
                `;
            }
            
            modal.style.display = 'block';
        }

        // ==================== AUTO-UPDATE SYSTEM ====================
        
        async function fetchLatestNews() {
            try {
                // Try to fetch from GitHub-generated JSON
                const response = await fetch('data/news_daily.json?v=' + Date.now());
                if (response.ok) {
                    const news = await response.json();
                    if (news && news.length > 0) {
                        dailyNews = news.map(n => n.title || n);
                        updateNewsTicker();
                        console.log('✅ News updated from server');
                    }
                }
            } catch (error) {
                console.log('Using cached news');
                // Keep using default news
            }
        }
        
        async function fetchLatestSchemes() {
            try {
                const response = await fetch('data/schemes_latest.json?v=' + Date.now());
                if (response.ok) {
                    const schemes = await response.json();
                    if (schemes && schemes.length > 0) {
                        // Merge with existing schemes (avoid duplicates)
                        const existingNames = new Set(governmentSchemes.map(s => s.name));
                        schemes.forEach(scheme => {
                            if (!existingNames.has(scheme.name)) {
                                governmentSchemes.push(scheme);
                            }
                        });
                        console.log(`✅ Added ${schemes.length} new schemes`);
                    }
                }
            } catch (error) {
                console.log('Using cached schemes');
            }
        }
        
        function updateNewsTicker() {
            const ticker = document.getElementById('newsTicker');
            if (ticker && dailyNews.length) {
                ticker.innerHTML = dailyNews.map(news => `🎯 ${news} • `).join('');
            }
        }
        
        // ==================== OFFLINE DETECTION ====================
        
        function updateOnlineStatus() {
            const indicator = document.getElementById('offlineIndicator');
            if (!navigator.onLine) {
                indicator.style.display = 'block';
            } else {
                indicator.style.display = 'none';
                // Refresh data when back online
                fetchLatestNews();
                fetchLatestSchemes();
            }
        }
        
        // ==================== LANGUAGE HANDLING ====================
        
        function setupLanguageButtons() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLang = btn.dataset.lang;
                    updateLanguage();
                });
            });
        }
        
        function updateLanguage() {
            const t = translations[currentLang];
            if (t) {
                document.getElementById('searchInput').placeholder = t.searchPlaceholder;
                // Update other text as needed
            }
        }
        
        // ==================== SERVICE WORKER REGISTRATION ====================
        
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.log('❌ Service Worker error:', err));
            }
        }
        
        // ==================== INITIALIZATION ====================
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
        
        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            populateFeatureGrid();
            setupLanguageButtons();
            registerServiceWorker();
            updateOnlineStatus();
            fetchLatestNews();
            fetchLatestSchemes();
            updateNewsTicker();
            
            // Auto-refresh every hour
            setInterval(() => {
                fetchLatestNews();
                fetchLatestSchemes();
            }, 3600000);
            
            // Online/offline listeners
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
        });
    </script>
</body>
