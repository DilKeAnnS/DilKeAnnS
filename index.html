<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दिल के अंश - Career Saathi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .badge {
            display: inline-block;
            background: #ffd32a;
            color: #333;
            padding: 5px 15px;
            border-radius: 30px;
            margin-top: 15px;
            font-weight: bold;
        }
        .search-bar {
            padding: 20px 30px;
            background: #f7f9fc;
            border-bottom: 1px solid #e1e8ed;
        }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus {
            border-color: #ee5a24;
        }
        .content {
            padding: 30px;
        }
        .folder-item, .file-item {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
            border-left: 4px solid #ee5a24;
        }
        .folder-item:hover, .file-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .folder-item::before {
            content: "📁 ";
            font-size: 1.2rem;
        }
        .file-item::before {
            content: "📄 ";
            font-size: 1.2rem;
        }
        .breadcrumb {
            padding: 15px 30px;
            background: #fff3e0;
            font-size: 0.9rem;
            border-bottom: 1px solid #ffe0b3;
        }
        .breadcrumb a {
            color: #ee5a24;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }
        .stats {
            background: #f1f3f5;
            padding: 15px 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            border-top: 1px solid #dee2e6;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .content { padding: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 दिल के अंश</h1>
        <p>Dil-Ke-AnnS Career Saathi</p>
        <div class="badge">🇮🇳 Anonymous Padho, Bindas Bano 🇮🇳</div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search files or folders...">
    </div>

    <div class="breadcrumb" id="breadcrumb">
        <a href="#" onclick="loadPath(''); return false;">🏠 Root</a>
    </div>

    <div class="content" id="fileList">
        <div class="loading">⏳ Loading your files from GitHub...</div>
    </div>

    <div class="stats" id="stats">
        Connecting to repository...
    </div>
</div>

<script>
    // Your GitHub details
    const USERNAME = 'DilKeAnnS';
    const REPO = 'DilKeAnnS';
    const BRANCH = 'main';
    const API_URL = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/`;

    let currentPath = '';

    async function loadPath(path = '') {
        currentPath = path;
        document.getElementById('fileList').innerHTML = '<div class="loading">📂 Loading...</div>';
        
        try {
            const url = API_URL + encodeURIComponent(path);
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const items = await response.json();
            displayItems(items, path);
            updateBreadcrumb(path);
            updateStats(items.length);
        } catch (error) {
            document.getElementById('fileList').innerHTML = 
                '<div style="color: red; padding: 20px;">❌ Error loading files. Make sure your repository is public.<br><br>' +
                '📌 Fix: Go to GitHub → Your Repo → Settings → Change visibility to PUBLIC (if private).</div>';
            console.error('Error:', error);
        }
    }

    function displayItems(items, path) {
        if (!items || items.length === 0) {
            document.getElementById('fileList').innerHTML = 
                '<div style="padding: 40px; text-align: center; color: #666;">📭 This folder is empty</div>';
            return;
        }

        // Separate folders and files
        const folders = items.filter(item => item.type === 'dir');
        const files = items.filter(item => item.type === 'file');

        let html = '';
        
        // Show folders first
        folders.forEach(folder => {
            html += `
                <a href="#" class="folder-item" onclick="loadPath('${folder.path}'); return false;">
                    ${folder.name}
                </a>
            `;
        });
        
        // Show files
        files.forEach(file => {
            const fileUrl = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/${BRANCH}/${file.path}`;
            html += `
                <a href="${fileUrl}" class="file-item" target="_blank">
                    ${file.name}
                </a>
            `;
        });
        
        document.getElementById('fileList').innerHTML = html;
    }

    function updateBreadcrumb(path) {
        const breadcrumbDiv = document.getElementById('breadcrumb');
        if (!path) {
            breadcrumbDiv.innerHTML = '<a href="#" onclick="loadPath(\'\'); return false;">🏠 Root</a>';
            return;
        }
        
        const parts = path.split('/');
        let breadHtml = '<a href="#" onclick="loadPath(\'\'); return false;">🏠 Root</a>';
        let cumulativePath = '';
        
        parts.forEach((part, index) => {
            cumulativePath += (index === 0 ? part : '/' + part);
            breadHtml += ` / <a href="#" onclick="loadPath('${cumulativePath}'); return false;">📂 ${part}</a>`;
        });
        
        breadcrumbDiv.innerHTML = breadHtml;
    }

    function updateStats(count) {
        const statsDiv = document.getElementById('stats');
        if (currentPath === '') {
            statsDiv.innerHTML = `📊 Total ${count} items in root folder | Click on any folder to explore`;
        } else {
            statsDiv.innerHTML = `📁 ${count} items in "${currentPath}" | Click on files to view/download`;
        }
    }

    // Load root folder on page start
    loadPath('');
    
    // Search filter functionality
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const allItems = document.querySelectorAll('.folder-item, .file-item');
        
        allItems.forEach(item => {
            const text = item.textContent.toLowerCase();
            if (text.includes(searchTerm)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
