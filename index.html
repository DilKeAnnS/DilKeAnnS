<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dil-Ke-AnnS | Career Saathi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #F5F0E8; padding-bottom: 70px; color: #2D2A24; }
        .header { background: linear-gradient(135deg, #1B4D3E 0%, #0D3B2F 100%); padding: 16px 16px 22px 16px; border-radius: 0 0 28px 28px; color: white; }
        .logo-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 45px; width: auto; border-radius: 12px; }
        .logo h1 { font-size: 18px; font-weight: 700; }
        .logo p { font-size: 9px; opacity: 0.85; }
        .language-selector select { background: rgba(255,255,255,0.15); color: white; border: none; padding: 6px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; outline: none; }
        .language-selector select option { color: black; background: white; }
        .notification-icon { font-size: 22px; background: rgba(255,255,255,0.15); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tagline { font-size: 13px; text-align: center; margin: 8px 0 4px; }
        .welcome { background: rgba(255,255,255,0.12); padding: 5px 12px; border-radius: 40px; font-size: 12px; display: inline-block; width: auto; text-align: center; }
        .hero { margin-top: 12px; }
        .search-bar { background: white; border-radius: 50px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
        .search-bar span:first-child { font-size: 18px; color: #64748B; }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; }
        .search-bar input::placeholder { font-size: 12px; color: #94A3B8; }
        .ask-ai { background: #E67E22; padding: 6px 12px; border-radius: 40px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; color: white; cursor: pointer; white-space: nowrap; }
        .ask-ai img { width: 18px; height: 18px; border-radius: 50%; }
        .container { padding: 18px 16px; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; border-left: 4px solid #E67E22; padding-left: 12px; }
        .tiles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .tile { background: white; border-radius: 16px; padding: 12px 4px; text-align: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.05); border: 1px solid #E8E2D9; transition: transform 0.1s ease; }
        .tile:active { transform: scale(0.97); }
        .tile-icon { font-size: 28px; margin-bottom: 6px; display: block; }
        .tile-name { font-size: 11px; font-weight: 600; color: #1a1a2e; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 6px 12px 18px; border-top: 1px solid #E8E2D9; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 10px; border-radius: 30px; }
        .nav-item span:first-child { font-size: 22px; }
        .nav-item span:last-child { font-size: 10px; font-weight: 500; color: #64748B; }
        .nav-item.active { background: #F0EADF; }
        .nav-item.active span:last-child { color: #1B4D3E; font-weight: 600; }
        .floating-ai { position: fixed; bottom: 75px; right: 14px; background: white; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,0.15); cursor: pointer; z-index: 99; border: 2px solid #E67E22; }
        .floating-ai img { width: 36px; height: 36px; border-radius: 50%; }
        @media (min-width: 768px) { .container { max-width: 1000px; margin: 0 auto; padding: 30px 24px; } .header { padding: 20px 5% 30px 5%; } .logo img { height: 60px; } .logo h1 { font-size: 26px; } .tiles-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; } .tile { padding: 20px 12px; } .tile-icon { font-size: 42px; } .tile-name { font-size: 14px; } .bottom-bar { padding: 10px 5% 22px; } .nav-item span:first-child { font-size: 28px; } .nav-item span:last-child { font-size: 14px; } .welcome { font-size: 14px; } .tagline { font-size: 16px; } .search-bar input { font-size: 16px; } .ask-ai { font-size: 14px; padding: 8px 16px; } }
        @media (max-width: 480px) { .tile-name { font-size: 10px; } .tile-icon { font-size: 26px; } .ask-ai span { display: none; } .ask-ai { padding: 6px 10px; } .logo-section { flex-wrap: wrap; justify-content: center; } }
    </style>
    <!-- Language Files -->
    <script src="languages-core.js"></script>
    <script src="languages-loader.js"></script>
    <!-- Data Files (Offline-first) -->
    <script src="data/education_streams.js"></script>
    <script src="data/magazines.js"></script>
    <script src="data/schemes.js"></script>
</head>
<body>
<div class="header">
    <div class="logo-section">
        <div class="logo">
            <img src="App%20logo.png" alt="Logo" onerror="this.style.display='none'">
            <div>
                <h1>दिल के अंश</h1>
                <p id="appTagline">Dil-Ke-AnnS Career Saathi</p>
            </div>
        </div>
        <div class="language-selector">
            <select id="languageSelect">
                <option value="en">🇬🇧 English</option>
                <option value="hi">🇮🇳 हिंदी</option>
                <option value="mr">🇮🇳 मराठी</option>
                <option value="ta">🇮🇳 தமிழ்</option>
                <option value="te">🇮🇳 తెలుగు</option>
                <option value="kn">🇮🇳 ಕನ್ನಡ</option>
                <option value="ml">🇮🇳 മലയാളം</option>
                <option value="bn">🇮🇳 বাংলা</option>
                <option value="gu">🇮🇳 ગુજરાતી</option>
                <option value="pa">🇮🇳 ਪੰਜਾਬੀ</option>
                <option value="or">🇮🇳 ଓଡ଼ିଆ</option>
                <option value="as">🇮🇳 অসমীয়া</option>
            </select>
        </div>
        <div class="notification-icon" id="alertBtn">🔔</div>
    </div>
    <div style="text-align: center;">
        <div class="tagline" id="taglineText">🇮🇳 Anonymous Padho, Bindas Bano 🇮🇳</div>
        <div class="welcome" id="welcomeMsg">👋 Welcome back, Learner!</div>
    </div>
    <div class="hero">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search courses, exams, jobs, schemes...">
            <div class="ask-ai" id="askAiBtn">
                <img src="AnnS%20AI%20tool%20logo.png" alt="AI">
                <span id="askAiText">Ask AnnS AI</span>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="section-title" id="exploreTitle">📚 Explore Career Pathways</div>
    <div class="tiles-grid" id="tilesGrid"></div>
</div>

<div class="floating-ai" id="floatingAiBtn">
    <img src="AnnS%20AI%20tool%20logo.png" alt="AI">
</div>

<div class="bottom-bar" id="bottomBar"></div>

<script>
    // ==================== TILES CONFIGURATION ====================
    const tiles = [
        { nameKey: "education", icon: "🎓", link: "education.html" },
        { nameKey: "business", icon: "💼", link: "business.html" },
        { nameKey: "jobs_exams", icon: "📝", link: "#" },
        { nameKey: "study_material", icon: "📚", link: "study_material.html" },
        { nameKey: "magazines", icon: "📰", link: "#" },
        { nameKey: "enewspapers", icon: "🗞️", link: "#" },
        { nameKey: "current_affairs", icon: "🌍", link: "#" },
        { nameKey: "mock_test", icon: "✅", link: "#" },
        { nameKey: "after_10th", icon: "📖", link: "after_10th.html" },
        { nameKey: "after_12th", icon: "🎯", link: "after_12th.html" },
        { nameKey: "something_interesting", icon: "💡", link: "something_interesting.html" },
        { nameKey: "gd_rooms", icon: "💬", link: "gd_rooms.html" },
        { nameKey: "results", icon: "📊", link: "#" },
        { nameKey: "application_forms", icon: "📋", link: "#" },
        { nameKey: "bharat", icon: "🇮🇳", link: "bharat.html" }
    ];

    const bottomNav = [
        { nameKey: "bottom_home", icon: "🏠", link: "index.html" },
        { nameKey: "bottom_search", icon: "🔍", link: "#" },
        { nameKey: "bottom_ai", icon: "🤖", link: "#" },
        { nameKey: "bottom_alerts", icon: "🔔", link: "#" },
        { nameKey: "bottom_profile", icon: "👤", link: "#" }
    ];

    let currentLang = 'en';

    const defaultText = {
        app_tagline: "Dil-Ke-AnnS Career Saathi",
        tagline: "🇮🇳 Anonymous Padho, Bindas Bano 🇮🇳",
        welcome: "👋 Welcome back, Learner!",
        search_placeholder: "Search courses, exams, jobs, schemes...",
        ask_ai: "Ask AnnS AI",
        explore_title: "📚 Explore Career Pathways",
        education: "Education",
        business: "Business",
        jobs_exams: "Jobs & Exams",
        study_material: "Study Material",
        magazines: "Magazines",
        enewspapers: "E-newspapers",
        current_affairs: "Current Affairs",
        mock_test: "Mock test",
        after_10th: "After 10th",
        after_12th: "After 12th",
        something_interesting: "Something Interesting",
        gd_rooms: "Group Discussion",
        results: "Results",
        application_forms: "App Forms",
        bharat: "🇮🇳 BHARAT",
        bottom_home: "Home",
        bottom_search: "Search",
        bottom_ai: "AnnS AI",
        bottom_alerts: "Alerts",
        bottom_profile: "Profile",
        coming_soon: "coming soon",
        searching: "Searching for",
        search_alert: "Please type something to search",
        ai_mentor: "AnnS AI Mentor",
        ai_modes: "Doubt Solver • Career Mentor • Debate Judge • Exam Planner",
        notification_center: "Notification Center",
        notifications: "Exam Alerts • Govt Schemes • Job Updates"
    };

    function t(key) {
        if (window.translations && window.translations[currentLang] && window.translations[currentLang][key]) {
            return window.translations[currentLang][key];
        }
        return defaultText[key] || key;
    }

    function updateAllText() {
        document.getElementById('appTagline').textContent = t('app_tagline');
        document.getElementById('taglineText').textContent = t('tagline');
        const hours = new Date().getHours();
        let greeting = hours < 12 ? '🌅 ' : (hours < 17 ? '☀️ ' : '🌙 ');
        document.getElementById('welcomeMsg').innerHTML = greeting + t('welcome');
        document.getElementById('searchInput').placeholder = t('search_placeholder');
        document.getElementById('askAiText').textContent = t('ask_ai');
        document.getElementById('exploreTitle').innerHTML = t('explore_title');
        
        document.querySelectorAll('.tile').forEach(tile => {
            const nameKey = tile.getAttribute('data-name-key');
            const nameSpan = tile.querySelector('.tile-name');
            if (nameSpan && nameKey) nameSpan.textContent = t(nameKey);
        });
        
        document.querySelectorAll('.nav-item').forEach(item => {
            const nameKey = item.getAttribute('data-name-key');
            const nameSpan = item.querySelector('span:last-child');
            if (nameSpan && nameKey) nameSpan.textContent = t(nameKey);
        });
    }

    function changeLanguage(langCode) {
        if (!window.translations || !window.translations[langCode]) return;
        currentLang = langCode;
        localStorage.setItem('career_saathi_language', langCode);
        document.getElementById('languageSelect').value = langCode;
        updateAllText();
    }

    function renderTiles() {
        const grid = document.getElementById('tilesGrid');
        if (!grid) return;
        grid.innerHTML = tiles.map(tile => `
            <div class="tile" data-link="${tile.link}" data-name-key="${tile.nameKey}">
                <span class="tile-icon">${tile.icon}</span>
                <div class="tile-name">${defaultText[tile.nameKey] || tile.nameKey}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.tile').forEach(tile => {
            tile.addEventListener('click', () => {
                const link = tile.getAttribute('data-link');
                const nameKey = tile.getAttribute('data-name-key');
                if (link && link !== '#') window.location.href = link;
                else alert(`🚀 ${t(nameKey)} ${t('coming_soon')}`);
            });
        });
        updateAllText();
    }

    function renderBottomBar() {
        const bar = document.getElementById('bottomBar');
        if (!bar) return;
        bar.innerHTML = bottomNav.map(item => `
            <div class="nav-item" data-link="${item.link}" data-name-key="${item.nameKey}">
                <span>${item.icon}</span>
                <span>${defaultText[item.nameKey] || item.nameKey}</span>
            </div>
        `).join('');
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', () => {
                const link = nav.getAttribute('data-link');
                const nameKey = nav.getAttribute('data-name-key');
                if (link && link !== '#') window.location.href = link;
                else alert(`📱 ${t(nameKey)} ${t('coming_soon')}`);
            });
        });
        updateAllText();
    }

    function setupSearch() {
        const input = document.getElementById('searchInput');
        if (input) {
            input.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    const query = e.target.value.trim();
                    alert(query ? `${t('searching')}: "${query}"` : t('search_alert'));
                }
            });
        }
    }

    function setupAI() {
        const askBtn = document.getElementById('askAiBtn');
        const floatingBtn = document.getElementById('floatingAiBtn');
        const openAI = () => alert(`🤖 ${t('ai_mentor')}\n\n${t('ai_modes')}`);
        if (askBtn) askBtn.addEventListener('click', openAI);
        if (floatingBtn) floatingBtn.addEventListener('click', openAI);
    }

    function setupNotifications() {
        const alertBtn = document.getElementById('alertBtn');
        if (alertBtn) {
            alertBtn.addEventListener('click', () => alert(`🔔 ${t('notification_center')}\n\n${t('notifications')}`));
        }
    }

    function loadSavedLanguage() {
        const saved = localStorage.getItem('career_saathi_language');
        if (saved && window.translations && window.translations[saved]) {
            currentLang = saved;
            document.getElementById('languageSelect').value = saved;
        }
        updateAllText();
    }

    // ==================== OFFLINE DATA INITIALIZATION ====================
    async function initializeOfflineData() {
        const DB_NAME = 'DilKeAnnS_MasterDB';
        const DB_VERSION = 2;
        
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            
            request.onerror = () => {
                console.error("❌ IndexedDB error:", request.error);
                reject(request.error);
            };
            
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('streams')) {
                    db.createObjectStore('streams', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('magazines')) {
                    db.createObjectStore('magazines', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('schemes')) {
                    db.createObjectStore('schemes', { keyPath: 'id' });
                }
                console.log("📦 Object stores created");
            };
            
            request.onsuccess = async (event) => {
                const db = event.target.result;
                
                try {
                    // Store streams
                    if (window.EDUCATION_STREAMS) {
                        const tx = db.transaction('streams', 'readonly');
                        const count = await new Promise(resolve => {
                            const req = tx.objectStore('streams').count();
                            req.onsuccess = () => resolve(req.result);
                        });
                        
                        if (count === 0) {
                            const writeTx = db.transaction('streams', 'readwrite');
                            const store = writeTx.objectStore('streams');
                            for (const [id, value] of Object.entries(window.EDUCATION_STREAMS)) {
                                store.put({ id, ...value });
                            }
                            await writeTx.complete;
                            console.log("✅ Streams saved:", Object.keys(window.EDUCATION_STREAMS).length);
                        }
                    }
                    
                    // Store magazines
                    if (window.MAGAZINES_DB) {
                        const tx = db.transaction('magazines', 'readonly');
                        const count = await new Promise(resolve => {
                            const req = tx.objectStore('magazines').count();
                            req.onsuccess = () => resolve(req.result);
                        });
                        
                        if (count === 0) {
                            const writeTx = db.transaction('magazines', 'readwrite');
                            const store = writeTx.objectStore('magazines');
                            for (const [category, items] of Object.entries(window.MAGAZINES_DB)) {
                                for (const item of items) {
                                    store.put({ id: `${category}_${item.name.replace(/\s/g, '_')}`, category, ...item });
                                }
                            }
                            await writeTx.complete;
                            console.log("✅ Magazines saved");
                        }
                    }
                    
                    // Store schemes
                    if (window.SCHEMES_DB) {
                        const tx = db.transaction('schemes', 'readonly');
                        const count = await new Promise(resolve => {
                            const req = tx.objectStore('schemes').count();
                            req.onsuccess = () => resolve(req.result);
                        });
                        
                        if (count === 0) {
                            const writeTx = db.transaction('schemes', 'readwrite');
                            const store = writeTx.objectStore('schemes');
                            for (const [category, items] of Object.entries(window.SCHEMES_DB)) {
                                for (const item of items) {
                                    store.put({ id: `${category}_${item.name.replace(/\s/g, '_')}`, category, ...item });
                                }
                            }
                            await writeTx.complete;
                            console.log("✅ Schemes saved");
                        }
                    }
                    
                    resolve();
                } catch (err) {
                    console.error("❌ Error saving data:", err);
                    reject(err);
                }
            };
        });
    }

    // ==================== SERVICE WORKER ====================
    async function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        try {
            const registration = await navigator.serviceWorker.register('/sw.js');
            console.log('✅ Service Worker registered');
            
            if ('sync' in registration) {
                try {
                    await registration.sync.register('sync-updates');
                    console.log('✅ Background sync registered');
                } catch (e) {
                    console.log('⚠️ Background sync not supported');
                }
            }
        } catch (err) {
            console.error('❌ Service Worker failed:', err);
        }
    }

    // ==================== INITIALIZE ====================
    document.getElementById('languageSelect').addEventListener('change', (e) => changeLanguage(e.target.value));
    
    renderTiles();
    renderBottomBar();
    setupSearch();
    setupAI();
    setupNotifications();
    loadSavedLanguage();
    
    // Start offline data and service worker after page loads
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            initializeOfflineData().then(() => registerServiceWorker());
        });
    } else {
        initializeOfflineData().then(() => registerServiceWorker());
    }
</script>
</body>
</html>
