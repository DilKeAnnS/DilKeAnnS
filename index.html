<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dil-Ke-AnnS | Career Saathi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Base styles (mobile first) */
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #F5F0E8;
            padding-bottom: 70px;
            color: #2D2A24;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1B4D3E 0%, #0D3B2F 100%);
            padding: 16px 16px 22px 16px;
            border-radius: 0 0 28px 28px;
            color: white;
        }

        .logo-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 45px;
            width: auto;
            border-radius: 12px;
        }

        .logo h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .logo p {
            font-size: 9px;
            opacity: 0.85;
        }

        .tagline {
            font-size: 13px;
            text-align: center;
            margin: 8px 0 4px;
        }

        .welcome {
            background: rgba(255,255,255,0.12);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 12px;
            display: inline-block;
            width: auto;
        }

        .notification-icon {
            font-size: 22px;
            background: rgba(255,255,255,0.15);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Search */
        .hero {
            margin-top: 12px;
        }

        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-bar span:first-child {
            font-size: 18px;
            color: #64748B;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
        }

        .search-bar input::placeholder {
            font-size: 12px;
            color: #94A3B8;
        }

        .ask-ai {
            background: #E67E22;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }

        .ask-ai img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        /* Main content */
        .container {
            padding: 18px 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            border-left: 4px solid #E67E22;
            padding-left: 12px;
        }

        /* Tiles: 3 per row on mobile */
        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tile {
            background: white;
            border-radius: 16px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1px solid #E8E2D9;
            transition: transform 0.1s ease;
        }

        .tile:active {
            transform: scale(0.97);
        }

        .tile-icon {
            font-size: 28px;
            margin-bottom: 6px;
            display: block;
        }

        .tile-name {
            font-size: 11px;
            font-weight: 600;
            color: #1a1a2e;
        }

        /* Bottom bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 6px 12px 18px;
            border-top: 1px solid #E8E2D9;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .nav-item span:first-child {
            font-size: 22px;
        }

        .nav-item span:last-child {
            font-size: 10px;
            font-weight: 500;
            color: #64748B;
        }

        .nav-item.active {
            background: #F0EADF;
        }

        .nav-item.active span:last-child {
            color: #1B4D3E;
            font-weight: 600;
        }

        /* Floating AI */
        .floating-ai {
            position: fixed;
            bottom: 75px;
            right: 14px;
            background: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 99;
            border: 2px solid #E67E22;
        }

        .floating-ai img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        /* ========== DESKTOP: show as phone frame ========== */
        @media (min-width: 768px) {
            body {
                background: #2c2c2c;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 24px;
            }

            /* Wrapper that looks like a phone */
            .phone-mock {
                max-width: 380px;
                width: 100%;
                background: #F5F0E8;
                border-radius: 48px;
                box-shadow: 0 25px 45px rgba(0,0,0,0.3);
                overflow: hidden;
                position: relative;
                height: auto;
                max-height: 780px;
                overflow-y: auto;
            }

            /* Hide any stray body content outside the mock */
            body > :not(.phone-mock) {
                display: none;
            }

            /* Bottom bar becomes sticky inside the mock */
            .bottom-bar {
                position: sticky;
                bottom: 0;
                background: white;
            }

            /* Optional: custom scrollbar */
            .phone-mock::-webkit-scrollbar {
                width: 4px;
            }
            .phone-mock::-webkit-scrollbar-track {
                background: #e0dcd5;
            }
            .phone-mock::-webkit-scrollbar-thumb {
                background: #1B4D3E;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>

<div class="phone-mock">
    <div class="header">
        <div class="logo-section">
            <div class="logo">
                <img src="App%20logo.png" alt="Logo" onerror="this.style.display='none'">
                <div>
                    <h1>दिल के अंश</h1>
                    <p>Dil-Ke-AnnS Career Saathi</p>
                </div>
            </div>
            <div class="notification-icon" id="alertBtn">🔔</div>
        </div>
        <div style="text-align: center;">
            <div class="tagline">🇮🇳 Anonymous Padho, Bindas Bano 🇮🇳</div>
            <div class="welcome" id="welcomeMsg">👋 Welcome back, Learner!</div>
        </div>
        <div class="hero">
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search courses, exams...">
                <div class="ask-ai" id="askAiBtn">
                    <img src="AnnS%20AI%20tool%20logo.png" alt="AI">
                    <span>Ask AI</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">📚 Explore Career Pathways</div>
        <div class="tiles-grid" id="tilesGrid"></div>
    </div>

    <div class="floating-ai" id="floatingAiBtn">
        <img src="AnnS%20AI%20tool%20logo.png" alt="AI">
    </div>

    <div class="bottom-bar" id="bottomBar"></div>
</div>

<script>
    const tiles = [
        { name: "Education", icon: "🎓" },
        { name: "Business", icon: "💼" },
        { name: "Jobs & Exams", icon: "📝" },
        { name: "Study Material", icon: "📚" },
        { name: "Magazines", icon: "📰" },
        { name: "E-newspapers", icon: "🗞️" },
        { name: "Current Affairs", icon: "🌍" },
        { name: "Mock test", icon: "✅" },
        { name: "After 10th", icon: "📖" },
        { name: "After 12th", icon: "🎯" },
        { name: "Interesting", icon: "💡" },
        { name: "Results", icon: "📊" },
        { name: "App Forms", icon: "📋" }
    ];

    const bottomNav = [
        { name: "Home", icon: "🏠", active: true },
        { name: "Search", icon: "🔍", active: false },
        { name: "AnnS AI", icon: "🤖", active: false },
        { name: "Alerts", icon: "🔔", active: false },
        { name: "Profile", icon: "👤", active: false }
    ];

    function renderTiles() {
        const grid = document.getElementById('tilesGrid');
        if (!grid) return;
        grid.innerHTML = tiles.map(t => `
            <div class="tile" data-name="${t.name}">
                <span class="tile-icon">${t.icon}</span>
                <div class="tile-name">${t.name}</div>
            </div>
        `).join('');
        document.querySelectorAll('.tile').forEach(t => {
            t.addEventListener('click', () => alert(`🚀 Opening: ${t.dataset.name}`));
        });
    }

    function renderBottomBar() {
        const bar = document.getElementById('bottomBar');
        if (!bar) return;
        bar.innerHTML = bottomNav.map(item => `
            <div class="nav-item ${item.active ? 'active' : ''}" data-nav="${item.name}">
                <span>${item.icon}</span>
                <span>${item.name}</span>
            </div>
        `).join('');
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', function() {
                const name = this.dataset.nav;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (name === 'Home') window.scrollTo({ top: 0, behavior: 'smooth' });
                else if (name === 'Search') document.getElementById('searchInput')?.focus();
                else alert(`📱 ${name} section coming soon!`);
            });
        });
    }

    function setupSearch() {
        const input = document.getElementById('searchInput');
        if (input) {
            input.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    const q = e.target.value.trim();
                    alert(q ? `🔍 Searching: "${q}"` : 'Type something to search');
                }
            });
        }
    }

    function setupAI() {
        const ask = document.getElementById('askAiBtn');
        const floating = document.getElementById('floatingAiBtn');
        const open = () => alert('🤖 AnnS AI Mentor\n• Doubt Solver\n• Career Mentor\n• Exam Planner');
        if (ask) ask.addEventListener('click', open);
        if (floating) floating.addEventListener('click', open);
    }

    function setupNotify() {
        const btn = document.getElementById('alertBtn');
        if (btn) btn.addEventListener('click', () => alert('🔔 Alerts: Exams, Jobs, Schemes, Updates'));
    }

    function setWelcome() {
        const h = new Date().getHours();
        const el = document.getElementById('welcomeMsg');
        if (el) {
            let msg = h < 12 ? '🌅 Good morning, Learner!' : (h < 17 ? '☀️ Good afternoon, Learner!' : '🌙 Good evening, Learner!');
            el.innerHTML = `👋 ${msg}`;
        }
    }

    renderTiles();
    renderBottomBar();
    setupSearch();
    setupAI();
    setupNotify();
    setWelcome();
</script>
</body>
</html>
