        // ---------- INDEXED DB ----------
        const DB_NAME = 'CurrentAffairsCompleteDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'saved_items';
        let db = null;
        
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }
        
        async function addToSaved(item) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.add({ ...item, savedDate: new Date().toISOString() });
                request.onsuccess = () => resolve(true);
                request.onerror = () => resolve(false);
            });
        }
        
        async function removeFromSaved(id) {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.delete(id);
                request.onsuccess = () => resolve(true);
            });
        }
        
        async function getAllSaved() {
            await openDatabase();
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
            });
        }

            },
            quiz: {
                name_hindi: "🎯 करेंट अफेयर्स क्विज़",
                name_english: "🎯 Current Affairs Quiz",
                icon: "🎯",
                items: [
                    { title_hindi: "जून 2026 साप्ताहिक क्विज़", title_english: "June 2026 Weekly Quiz", description_hindi: "20 प्रश्न - जून 2026 के पहले सप्ताह पर आधारित", description_english: "20 questions based on June 2026 week 1", quizLink: "#", type: "quiz" },
                    { title_hindi: "मई 2026 मासिक क्विज़", title_english: "May 2026 Monthly Quiz", description_hindi: "50 प्रश्न - पूरे मई 2026 के करेंट अफेयर्स पर", description_english: "50 questions on full May 2026 CA", quizLink: "#", type: "quiz" }
                ]
            }
        };

        // ---------- UI HELPERS ----------
        const categoryList = [
            { id: 'daily', icon: '📅', name_hindi: 'दैनिक', name_english: 'Daily' },
            { id: 'weekly', icon: '📆', name_hindi: 'साप्ताहिक', name_english: 'Weekly' },
            { id: 'monthly', icon: '📖', name_hindi: 'मासिक', name_english: 'Monthly' },
            { id: 'quarterly', icon: '🗓️', name_hindi: 'त्रैमासिक', name_english: 'Quarterly' },
            { id: 'yearly', icon: '📚', name_hindi: 'वार्षिक', name_english: 'Yearly' },
            { id: 'state', icon: '🗺️', name_hindi: 'राज्य-वार', name_english: 'State-wise' },
            { id: 'international', icon: '🌍', name_hindi: 'अंतर्राष्ट्रीय', name_english: 'International' },
            { id: 'schemes', icon: '🏛️', name_hindi: 'योजनाएँ', name_english: 'Schemes' },
            { id: 'video', icon: '🎥', name_hindi: 'वीडियो', name_english: 'Video' },
            { id: 'quiz', icon: '🎯', name_hindi: 'क्विज़', name_english: 'Quiz' }
        ];

        function renderCategories() {
            const container = document.getElementById('categoryDoors');
            container.innerHTML = categoryList.map(cat => `
                <button class="category-door ${currentCategory === cat.id ? 'active' : ''}" onclick="switchCategory('${cat.id}')">
                    ${cat.icon} ${currentUILanguage === 'hindi' ? cat.name_hindi : cat.name_english}
                </button>
            `).join('');
        }

        function switchCategory(categoryId) {
            currentCategory = categoryId;
            renderCategories();
            renderDoors();
        }

        async function toggleSave(item, category) {
            const safeId = `${category}_${item.title_english.replace(/\s/g, '_')}_${Date.now()}`;
            const savedItem = { ...item, id: safeId, category: category };
            const success = await addToSaved(savedItem);
            if (success) alert('✅ सेव हो गया! "📚 सेव्ड" में देखें।');
            renderDoors();
        }

        async function renderDoors() {
            const container = document.getElementById('doorsContainer');
            const searchInput = document.getElementById('searchBox');
            searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            const data = CURRENT_AFFAIRS_DATA[currentCategory];
            if (!data) return;
            
            let filteredItems = data.items.filter(item => 
                !searchTerm || 
                (currentUILanguage === 'hindi' ? item.title_hindi : item.title_english).toLowerCase().includes(searchTerm) ||
                (currentUILanguage === 'hindi' ? item.description_hindi : item.description_english).toLowerCase().includes(searchTerm)
            );
            
            let html = `
                <div class="door-card">
                    <div class="door-header ${currentCategory}">
                        <span class="door-icon">${data.icon}</span>
                        <div class="door-title">${currentUILanguage === 'hindi' ? data.name_hindi : data.name_english}</div>
                    </div>
                    <div class="door-content">
                        ${filteredItems.map(item => `
                            <div class="news-card">
                                <div class="news-title">${currentUILanguage === 'hindi' ? item.title_hindi : item.title_english}</div>
                                <div class="news-description">${currentUILanguage === 'hindi' ? item.description_hindi : item.description_english}</div>
                                <div class="news-detail">
                                    ${item.date ? `<span class="badge date">📅 ${item.date}</span>` : ''}
                                    ${item.exam ? `<span class="badge exam">📚 ${item.exam}</span>` : ''}
                                    ${item.pdfLink ? `<span class="badge pdf">📄 PDF</span>` : ''}
                                    ${item.videoLink ? `<span class="badge video">🎥 Video</span>` : ''}
                                    <span class="badge free">🎓 निःशुल्क</span>
                                </div>
                                <div class="card-actions">
                                    ${item.pdfLink ? `<button class="action-btn read" onclick="window.open('${item.pdfLink}', '_blank')">📖 पढ़ें</button>` : ''}
                                    ${item.videoLink ? `<button class="action-btn read" onclick="window.open('${item.videoLink}', '_blank')">🎥 देखें</button>` : ''}
                                    <button class="action-btn save" onclick='toggleSave(${JSON.stringify(item).replace(/'/g, "\\'")}, "${currentCategory}")'>📥 सेव करें</button>
                                </div>
                            </div>
                        `).join('')}
                        ${filteredItems.length === 0 ? '<div class="empty-state">🔍 कोई परिणाम नहीं मिला / No results found</div>' : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        async function loadSavedList() {
            const items = await getAllSaved();
            const container = document.getElementById('savedList');
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 कोई सेव्ड आइटम नहीं। "📥 सेव करें" पर क्लिक करें!</div>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="saved-item">
                    <div class="news-title">${currentUILanguage === 'hindi' ? item.title_hindi : item.title_english}</div>
                    <div class="news-description">${currentUILanguage === 'hindi' ? item.description_hindi : item.description_english}</div>
                    <div class="card-actions">
                        <button class="action-btn read" onclick="window.open('${item.pdfLink || item.videoLink || '#'}', '_blank')">📖 खोलें</button>
                        <button class="action-btn save" onclick="removeSavedAndRefresh('${item.id}')">🗑️ हटाएँ</button>
                    </div>
                </div>
            `).join('');
        }

        async function removeSavedAndRefresh(id) {
            await removeFromSaved(id);
            await loadSavedList();
            renderDoors();
        }

        function toggleSavedPanel() {
            const panel = document.getElementById('savedPanel');
            const overlay = document.getElementById('overlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('active');
            if (panel.classList.contains('open')) loadSavedList();
        }

        function toggleUILanguage() {
            currentUILanguage = currentUILanguage === 'hindi' ? 'english' : 'hindi';
            const btn = document.querySelector('.lang-toggle');
            btn.innerHTML = currentUILanguage === 'hindi' ? '🇬🇧 English' : '🇮🇳 हिंदी';
            renderCategories();
            renderDoors();
        }

        function handleSearch() { renderDoors(); }

        async function init() {
            await openDatabase();
            renderCategories();
            renderDoors();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
        }
        init();
    </script>
</body>
</html>
