                    { title_hindi: "Merger & Acquisition", title_english: "M&A", description_hindi: "किसी बड़ी कंपनी के साथ मिल जाएँ", benefit: "सिनर्जी", officialLink: "https://www.mca.gov.in/" },
                    { title_hindi: "IPO", title_english: "IPO", description_hindi: "शेयर बाजार में लिस्टिंग", requirement: "₹50Cr+ टर्नओवर", officialLink: "https://www.nseindia.com/" },
                    { title_hindi: "Succession Planning", title_english: "Succession", description_hindi: "परिवार या टीम को बिजनेस सौंपें", officialLink: "https://www.startupindia.gov.in/" }

                    { title_hindi: "Comparable Company", title_english: "Comparable", description_hindi: "समान कंपनियों के साथ तुलना", multiple: "PE Ratio, EV/EBITDA", officialLink: "https://www.investopedia.com/terms/c/comparable-company-analysis-cca.asp" },
                    { title_hindi: "VC Method", title_english: "VC Method", description_hindi: "स्टार्टअप वैल्यूएशन का सबसे आम तरीका", formula: "Exit Value ÷ Target ROI", officialLink: "https://www.ycombinator.com/library" }
                ]
            },
            // DOOR 24: LEGAL AGREEMENTS
            agreements: {

                items: [

                    { title_hindi: "Shareholders Agreement", title_english: "SHA", description_hindi: "शेयरधारकों के अधिकार और कर्तव्य", includes: "इक्विटी, वोटिंग", officialLink: "https://www.sebi.gov.in/" },
                    { title_hindi: "NDA", title_english: "NDA", description_hindi: "गुप्त जानकारी साझा करने से पहले", types: "एकतरफा, दोतरफा", officialLink: "https://www.mca.gov.in/" },
                    { title_hindi: "Employment Agreement", title_english: "Employment", description_hindi: "कर्मचारी के साथ लिखित समझौता", includes: "सैलरी, जॉब रोल", officialLink: "https://labour.gov.in/" }
                ]
            },
            // DOOR 25: FINANCIAL CONTROLS
            financial: {
                name_hindi: "📊 वित्तीय नियंत्रण",
                name_english: "📊 Financial Controls",
                icon: "📊",
                items: [
                    { title_hindi: "Daily Monitoring", title_english: "Daily", description_hindi: "हर मैनेजर का अपना डैशबोर्ड", frequency: "दैनिक", purpose: "Micro-adjustments", officialLink: "https://www.score.org/" },
                    { title_hindi: "Monthly Reviews", title_english: "Monthly", description_hindi: "एक्चुअल ऑपरेटिंग स्टेटमेंट", frequency: "मासिक", purpose: "Track actual vs forecast", officialLink: "https://www.score.org/resource/monthly-financial-reviews" },
                    { title_hindi: "Quarterly Reports", title_english: "Quarterly", description_hindi: "पूरा एक्चुअल और फोरकास्ट रिजल्ट", frequency: "त्रैमासिक", purpose: "Strategic adjustments", officialLink: "https://www.sba.gov/business-guide/manage-your-business/review-your-financial-statements" },
                    { title_hindi: "Annual Planning", title_english: "Annual", description_hindi: "एक्चुअल फुल ईयर रिजल्ट्स", frequency: "वार्षिक", purpose: "Long-term strategy", officialLink: "https://www.score.org/resource/annual-business-planning" }

        // Complete category list - 25 doors
        const categoryList = [
            { id: 'roadmap', icon: '🗺️', name_hindi: 'रोडमैप', name_english: 'Roadmap' },
            { id: 'schemes', icon: '🏛️', name_hindi: 'सरकारी योजनाएँ', name_english: 'Govt Schemes' },
            { id: 'mistakes', icon: '⚠️', name_hindi: 'कॉमन मिस्टेक्स', name_english: 'Common Mistakes' },
            { id: 'ideas', icon: '💡', name_hindi: 'बिजनेस आइडियाज', name_english: 'Business Ideas' },
            { id: 'onlineideas', icon: '💻', name_hindi: 'ऑनलाइन बिजनेस', name_english: 'Online Business' },
            { id: 'skills', icon: '🎯', name_hindi: 'जरूरी स्किल्स', name_english: 'Essential Skills' },

            { id: 'online', icon: '💻', name_hindi: 'ऑनलाइन टूल्स', name_english: 'Online Tools' },
            { id: 'global', icon: '🌍', name_hindi: 'ग्लोबल बिजनेस', name_english: 'Global Business' },
            { id: 'success', icon: '🏆', name_hindi: 'सक्सेस स्टोरीज', name_english: 'Success Stories' },
            { id: 'sales', icon: '📈', name_hindi: 'सेल्स गाइड', name_english: 'Sales Guide' },
            { id: 'scaling', icon: '📈', name_hindi: 'स्केलिंग', name_english: 'Scaling' },
            { id: 'ipo', icon: '📊', name_hindi: 'IPO गाइड', name_english: 'IPO Guide' },
            { id: 'structure', icon: '🏢', name_hindi: 'बिजनेस स्ट्रक्चर', name_english: 'Business Structure' },
            { id: 'registration', icon: '📝', name_hindi: 'रजिस्ट्रेशन प्रोसेस', name_english: 'Registration Process' },
            { id: 'tax', icon: '💰', name_hindi: 'टैक्स गाइड', name_english: 'Tax Guide' },
            { id: 'licenses', icon: '📜', name_hindi: 'लाइसेंस', name_english: 'Licenses' },
            { id: 'hr', icon: '👥', name_hindi: 'HR & पेरोल', name_english: 'HR & Payroll' },
            { id: 'insurance', icon: '🛡️', name_hindi: 'बीमा', name_english: 'Insurance' },
            { id: 'exit', icon: '🚪', name_hindi: 'एग्जिट स्ट्रैटेजी', name_english: 'Exit Strategy' },
            { id: 'valuation', icon: '💰', name_hindi: 'वैल्यूएशन', name_english: 'Valuation' },

            { id: 'financial', icon: '📊', name_hindi: 'वित्तीय नियंत्रण', name_english: 'Financial Controls' }
        ];

        function renderCategories() {
            const container = document.getElementById('categoryDoors');
            container.innerHTML = categoryList.map(cat => `
                <button class="category-door ${currentCategory === cat.id ? 'active' : ''}" onclick="switchCategory('${cat.id}')">
                    ${cat.icon} ${currentLang === 'hindi' ? cat.name_hindi : cat.name_english}
                </button>
            `).join('');
        }

        function switchCategory(categoryId) {
            currentCategory = categoryId;
            renderCategories();
            renderDoors();
        }

        function filterItems(items) {
            if (!searchTerm) return items;
            const term = searchTerm.toLowerCase();
            return items.filter(item => 
                (item.title_hindi?.toLowerCase().includes(term) ||
                 item.title_english?.toLowerCase().includes(term) ||
                 item.description_hindi?.toLowerCase().includes(term))
            );
        }

        function getLevelBadge(level) {
            if (!level) return '';
            return `<span class="badge badge-level" style="background:#2196f3;">📍 ${level}</span>`;
        }

        function renderDoors() {
            const data = BUSINESS_DATA[currentCategory];
            if (!data) {
                document.getElementById('doorsContainer').innerHTML = '<div class="empty-state">📭 Please select a category from above.</div>';
                return;
            }
            
            const searchInput = document.getElementById('searchBox');
            searchTerm = searchInput ? searchInput.value : '';
            
            let filteredItems = filterItems(data.items);
            
            const container = document.getElementById('doorsContainer');
            
            let html = `
                <div class="door-card">
                    <div class="door-header ${currentCategory}">
                        <span class="door-icon">${data.icon}</span>
                        <div class="door-title">${currentLang === 'hindi' ? data.name_hindi : data.name_english}</div>
                    </div>
                    <div class="door-content">
                        ${filteredItems.map(item => `
                            <div class="item-card">
                                <div class="item-title">${currentLang === 'hindi' ? item.title_hindi : item.title_english}</div>
                                <div class="item-description">${currentLang === 'hindi' ? item.description_hindi : item.description_english}</div>
                                <div class="item-detail">
                                    ${item.investment ? `<span class="badge badge-amount">💰 निवेश: ${item.investment}</span>` : ''}
                                    ${item.profit ? `<span class="badge badge-benefit">📈 मुनाफा: ${item.profit}</span>` : ''}
                                    ${item.amount ? `<span class="badge badge-amount">💰 ${item.amount}</span>` : ''}
                                    ${item.level ? getLevelBadge(item.level) : ''}
                                    ${item.platform ? `<span class="badge badge-online">🖥️ ${item.platform}</span>` : ''}
                                    ${item.eligibility ? `<span class="badge badge-stage">✅ पात्रता: ${item.eligibility}</span>` : ''}
                                    ${item.frequency ? `<span class="badge badge-stage">📅 ${item.frequency}</span>` : ''}
                                </div>
                                <a href="${item.officialLink}" target="_blank" class="official-link">🔗 विस्तृत जानकारी / Official Info →</a>
                            </div>
                        `).join('')}
                        ${filteredItems.length === 0 ? '<div class="empty-state">🔍 कोई परिणाम नहीं मिला / No results found</div>' : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function handleSearch() {
            renderDoors();
        }

        function init() {
            renderCategories();
            renderDoors();
            document.getElementById('searchBox').addEventListener('input', handleSearch);
        }
        
        init();
    </script>
</body>
